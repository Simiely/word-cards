<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>选择动物 - Animal Select</title>
    <style>
        :root {
            --bg: #f5f0e8;
            --card-bg: #ffffff;
            --primary: #4a7c59;
            --accent: #e8a87c;
            --text: #3c3c3c;
            --radius: 24px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html { overflow-y: auto; }
        body {
            font-family: 'Segoe UI','PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
            background: var(--bg);
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            padding: calc(12px + var(--safe-top)) 12px calc(12px + var(--safe-bottom)) 12px;
            min-height: 100dvh;
        }

        /* 顶部栏 */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            max-width: 800px; margin: 0 auto 12px; padding: 0 4px;
        }
        .top-bar .title { font-size: 18px; font-weight: 700; color: var(--text); }
        .top-bar .btn-back {
            display: inline-block; background: var(--card-bg); color: var(--text);
            font-size: 14px; padding: 8px 18px; border-radius: 20px;
            border: 2px solid #e0dcd4; cursor: pointer; text-decoration: none;
            font-weight: 600; transition: all 0.2s;
        }
        .top-bar .btn-back:active { border-color: var(--primary); color: var(--primary); }

        /* 瀑布流网格 */
        .grid {
            max-width: 800px; margin: 0 auto;
            display: grid; gap: 10px;
            grid-template-columns: repeat(4, 1fr);
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        }
        @media (max-width: 360px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
        }

        .grid-item {
            aspect-ratio: 1;
            border-radius: 16px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; position: relative;
            transition: transform 0.15s, filter 0.3s, opacity 0.3s;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .grid-item:active { transform: scale(0.94); }
        .grid-item .item-emoji {
            font-size: clamp(28px, 8vw, 44px); line-height: 1.2;
            transition: filter 0.3s;
        }
        .grid-item .item-name {
            font-size: clamp(10px, 2.5vw, 13px); color: rgba(255,255,255,0.9);
            font-weight: 600; margin-top: 2px; letter-spacing: 0.5px;
            transition: opacity 0.3s;
        }
        /* 已访问过的动物 - 灰度 */
        .grid-item.visited {
            filter: grayscale(0.7);
            opacity: 0.55;
        }

        /* 卡片弹出层 */
        .card-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000;
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .card-overlay.active { opacity: 1; pointer-events: auto; }
        .card-overlay .card-wrapper {
            flex-shrink: 0;
            width: 100%; max-width: 520px;
            margin: 20px auto 0; padding: 0 12px;
        }
        .card-overlay .card {
            width: 100%;
            background: var(--card-bg); border-radius: var(--radius);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        .card-overlay .card-image {
            width: 100%; aspect-ratio: 3/4;
            overflow: hidden; background: #eef2e6; position: relative;
            touch-action: none;
        }
        .card-overlay .card-image img {
            position: absolute; display: block;
            width: 100%; height: 100%;
            object-fit: contain;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
        .card-overlay .card-body {
            flex-shrink: 0; padding: 14px 24px 16px;
            text-align: left; position: relative;
        }
        .card-overlay .card-body .animal-emoji {
            position: absolute; top: 14px; right: 24px;
            font-size: clamp(36px, 7vw, 48px); line-height: 1;
            pointer-events: none; opacity: 0.85;
        }
        .card-overlay .card-body .zh-name {
            font-size: clamp(28px, 5vw, 36px); font-weight: 700; color: var(--text);
            cursor: pointer; line-height: 1.3; padding-right: 60px;
        }
        .card-overlay .card-body .zh-name:active { color: var(--primary); }
        .card-overlay .card-body .en-name {
            font-size: clamp(17px, 3.5vw, 20px); font-weight: 400; color: #888;
            cursor: pointer; margin-top: 8px; line-height: 1.4; padding-right: 60px;
        }
        .card-overlay .card-body .en-name:active { color: var(--accent); }
        .card-overlay .card-body .fact {
            font-size: clamp(12px, 2.2vw, 14px); color: #888; margin-top: 12px;
            line-height: 1.65; cursor: pointer;
        }
        .card-overlay .card-body .fact:active { color: var(--primary); }
        .card-overlay .btn-close {
            position: absolute; top: 10px; right: 10px; z-index: 10;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(0,0,0,0.5); border: none;
            color: #fff; font-size: 20px; line-height: 36px; text-align: center;
            cursor: pointer; backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
        }
        .card-overlay .btn-close:active { background: rgba(0,0,0,0.7); }

        /* 卡片下方的网格（滚动区域） */
        .card-overlay .grid-below {
            flex-shrink: 0; width: 100%; max-width: 800px;
            margin: 16px auto 40px; padding: 0 12px;
        }

        /* 加载动画 */
        .loading-dot {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; font-size: 60px;
            animation: breathe 1.2s ease-in-out infinite;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
            display: none;
        }
        .loading-dot.show { display: block; opacity: 1; }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>

// ========== DOM 引用 ==========
const gridEl = document.getElementById('grid');
const gridBelowEl = document.getElementById('gridBelow');
const cardOverlay = document.getElementById('cardOverlay');
const popCardImage = document.getElementById('popCardImage');
const popEmoji = document.getElementById('popEmoji');
const popZhName = document.getElementById('popZhName');
const popEnName = document.getElementById('popEnName');
const popFact = document.getElementById('popFact');
const btnClose = document.getElementById('btnClose');
const loadingDot = document.getElementById('loadingDot');

// ========== 访问记录（localStorage） ==========
function getVisited() {
    try {
        var raw = localStorage.getItem('animal_select_visited');
        return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
}
function markVisited(index) {
    var visited = getVisited();
    if (visited.indexOf(index) < 0) {
        visited.push(index);
        localStorage.setItem('animal_select_visited', JSON.stringify(visited));
    }
    updateVisitedClass();
}

function updateVisitedClass() {
    var visited = getVisited();
    var items = document.querySelectorAll('.grid-item');
    for (var i = 0; i < items.length; i++) {
        var idx = parseInt(items[i].getAttribute('data-index'));
        if (visited.indexOf(idx) >= 0) {
            items[i].classList.add('visited');
        }
    }
}

// ========== 提取 emoji 平均色 ==========
// 用 canvas 渲染 emoji，取非透明像素的平均色
var emojiColorCache = {};
function getEmojiAvgColor(emoji, callback) {
    if (emojiColorCache[emoji]) {
        callback(emojiColorCache[emoji]);
        return;
    }
    var canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 64, 64);
    ctx.font = '48px "Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, 32, 32);

    var imageData = ctx.getImageData(0, 0, 64, 64).data;
    var r = 0, g = 0, b = 0, count = 0;
    for (var i = 0; i < imageData.length; i += 4) {
        var alpha = imageData[i + 3];
        if (alpha > 50) {
            r += imageData[i];
            g += imageData[i + 1];
            b += imageData[i + 2];
            count++;
        }
    }
    var color;
    if (count > 0) {
        r = Math.round(r / count);
        g = Math.round(g / count);
        b = Math.round(b / count);
    } else {
        r = 180; g = 180; b = 180; // fallback
    }
    // 混合70%黑色
    r = Math.round(r * 0.3);
    g = Math.round(g * 0.3);
    b = Math.round(b * 0.3);
    color = 'rgb(' + r + ',' + g + ',' + b + ')';
    emojiColorCache[emoji] = color;
    callback(color);
}

// ========== 构建网格 ==========
function buildGrid(container, onClickHandler) {
    container.innerHTML = '';
    for (var i = 0; i < animals.length; i++) {
        (function(idx) {
            var a = animals[idx];
            var item = document.createElement('div');
            item.className = 'grid-item';
            item.setAttribute('data-index', idx);
            getEmojiAvgColor(a.emoji, function(color) {
                item.style.backgroundColor = color;
            });
            item.innerHTML = '<div class="item-emoji">' + a.emoji + '</div><div class="item-name">' + a.zh + '</div>';
            item.addEventListener('click', function() { onClickHandler(idx); });
            container.appendChild(item);
        })(i);
    }
}

// ========== 预加载单个动物的资源 ==========
function preloadAnimal(index) {
    return new Promise(function(resolve) {
        var a = animals[index];
        var urls = [];
        if (a.image) urls.push(a.image);
        if (a.speech_zh) urls.push(a.speech_zh);
        if (a.speech_en) urls.push(a.speech_en);
        if (a.speech_fact) urls.push(a.speech_fact);
        if (a.sound) urls.push(a.sound);

        if (urls.length === 0) { resolve(); return; }
        var pending = urls.length;
        function oneDone() { pending--; if (pending <= 0) resolve(); }
        for (var i = 0; i < urls.length; i++) {
            var url = urls[i];
            var isAudio = /\.(mp3|wav|ogg|m4a)(\?|$)/i.test(url);
            if (isAudio) {
                var audio = new Audio();
                audio.preload = 'auto';
                audio.src = url;
                audio.onloadeddata = oneDone;
                audio.onerror = oneDone;
                setTimeout(function() { if (audio.readyState < 2) oneDone(); }, 3000);
            } else {
                var img = new Image();
                img.src = url;
                img.onload = oneDone;
                img.onerror = oneDone;
                setTimeout(function() { if (!img.complete) oneDone(); }, 3000);
            }
        }
    });
}

// ========== 语音 ==========
var speechAudio = null;
function speak(lang, animal) {
    try {
        var src;
        if (lang === 'zh') src = animal.speech_zh;
        else if (lang === 'en') src = animal.speech_en;
        else if (lang === 'fact') src = animal.speech_fact;
        if (!src) return;
        if (speechAudio) { speechAudio.pause(); speechAudio = null; }
        speechAudio = new Audio(src);
        speechAudio.volume = 1;
        speechAudio.play().catch(function(){});
    } catch(e) {}
}

// ========== 卡片弹出 ==========
var currentPopIndex = -1;

    var a = animals[index];
    loadingDot.textContent = a.emoji;
    loadingDot.classList.add('show');

    preloadAnimal(index).then(function() {
        loadingDot.classList.remove('show');

        // 填充卡片内容
        popEmoji.textContent = a.emoji;
        popZhName.textContent = a.zh;
        popEnName.textContent = a.en;
        popFact.textContent = a.fact;

        // 渲染图片
        popCardImage.style.backgroundColor = '';
        popCardImage.innerHTML = '<img src="' + a.image + '" alt="' + a.zh + '" id="popImg"><button class="btn-close" id="btnClose2">✕</button>';
        var popImg = document.getElementById('popImg');
        var btnClose2 = document.getElementById('btnClose2');

        // 边缘平均色
        popImg.addEventListener('load', function() {
            if (!popImg.naturalWidth) return;
            try {
                var canvas = document.createElement('canvas');
                var ctx = canvas.getContext('2d');
                var iw = popImg.naturalWidth, ih = popImg.naturalHeight;
                canvas.width = iw; canvas.height = ih;
                ctx.drawImage(popImg, 0, 0, iw, ih);
                var top = ctx.getImageData(0, 0, iw, 1).data;
                var bottom = ctx.getImageData(0, ih-1, iw, 1).data;
                var left = ctx.getImageData(0, 0, 1, ih).data;
                var right = ctx.getImageData(iw-1, 0, 1, ih).data;
                var r = 0, g = 0, b = 0, count = 0;
                function add(data) {
                    for (var i = 0; i < data.length; i += 4) {
                        r += data[i]; g += data[i+1]; b += data[i+2]; count++;
                    }
                }
                add(top); add(bottom); add(left); add(right);
                r = Math.round(r / count);
                g = Math.round(g / count);
                b = Math.round(b / count);
                popCardImage.style.backgroundColor = 'rgb(' + r + ',' + g + ',' + b + ')';
            } catch(e) {}
        });

        btnClose2.addEventListener('click', function(e) {
            e.stopPropagation();
            closeCard();
        });

        // 关闭按钮也加到 overlay 的点击空白区域
        cardOverlay.addEventListener('click', function(e) {
            if (e.target === cardOverlay) closeCard();
        });

        cardOverlay.classList.add('active');
        markVisited(index);

        // 重建下方网格
        buildGrid(gridBelowEl, function(idx) {
            showCard(idx);
        });
        updateVisitedClass();

        // 自动朗读
        setTimeout(function() { speak('zh', a); }, 400);
    });
}

function closeCard() {
    cardOverlay.classList.remove('active');
    // 更新主网格的 visited 状态
    updateVisitedClass();
}

btnClose.addEventListener('click', function(e) {
    e.stopPropagation();
    closeCard();
});

// 点击卡片文字发音
document.getElementById('popCard').addEventListener('click', function(e) {
    var target = e.target;
    if (currentPopIndex < 0) return;
    var a = animals[currentPopIndex];
    if (target === popZhName) { speak('zh', a); }
    else if (target === popEnName) { speak('en', a); }
    else if (target === popFact) { speak('fact', a); }
});

// ========== 启动 ==========
buildGrid(gridEl, function(idx) {
    showCard(idx);
});
updateVisitedClass();
</script>
</body>
</html>
