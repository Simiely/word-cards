<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://simiely.github.io">
    <meta name="theme-color" content="#4a7c59">
    <title>浏览模式 - Animal Browse</title>
    <link rel="stylesheet" href="common.css">
    <style>
        html { overflow-y: auto; }
        body {
            padding: calc(12px + var(--safe-top)) 12px calc(12px + var(--safe-bottom)) 12px;
            min-height: 100dvh;
        }

        /* 顶部栏 */
        .top-bar {
            display: flex; align-items: center; justify-content: space-between;
            max-width: 800px; margin: 0 auto 12px; padding: 4px 4px 0; position: relative;
        }
        .top-bar .badge {
            display: inline-block; background: var(--primary); color: #fff;
            font-size: 14px; padding: 8px 18px; border-radius: 20px; letter-spacing: 0.5px;
            font-weight: 600; flex-shrink: 0;
        }
        .top-bar .category-title {
            font-size: clamp(20px, 4.5vw, 26px); font-weight: 700; color: var(--text);
            letter-spacing: 1px; position: absolute; left: 50%; transform: translateX(-50%);
            pointer-events: none;
        }
        .top-bar .btn-group {
            display: flex; gap: 8px; flex-shrink: 0;
        }
        .top-bar .btn-back {
            display: inline-block; background: var(--card-bg); color: var(--text);
            font-size: 14px; padding: 8px 18px; border-radius: 20px;
            border: 2px solid #e0dcd4; cursor: pointer; text-decoration: none;
            font-weight: 600; transition: all 0.2s;
        }
        .top-bar .btn-back:active { border-color: var(--primary); color: var(--primary); }
        .top-bar .btn-refresh {
            display: inline-block; background: var(--card-bg); color: var(--text);
            font-size: 14px; padding: 8px 18px; border-radius: 20px;
            border: 2px solid #e0dcd4; cursor: pointer;
            font-weight: 600; transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .top-bar .btn-refresh:active { border-color: var(--accent); color: var(--accent); }
        .top-bar .btn-home {
            display: inline-block; background: var(--card-bg); color: var(--text);
            font-size: 14px; padding: 8px 18px; border-radius: 20px;
            border: 2px solid #e0dcd4; cursor: pointer; text-decoration: none;
            font-weight: 600; transition: all 0.2s;
        }
        .top-bar .btn-home:active { border-color: var(--primary); color: var(--primary); }
        .top-bar .btn-offline-select {
            background: #e8f0fe; border: 2px solid #4285f4; color: #1a56c4;
            font-size: 14px; padding: 8px 18px; border-radius: 20px;
            cursor: pointer; font-weight: 600; transition: all 0.2s;
        }
        .top-bar .btn-offline-select:active { background: #4285f4; color: #fff; }
        .top-bar .btn-offline-select.done { background: #e8f5e9; border-color: #66bb6a; color: #2e7d32; }
        .top-bar .btn-offline-select.loading { opacity: 0.7; pointer-events: none; animation: pulse 1s ease-in-out infinite; }

        /* 瀑布流网格 */
        .grid {
            max-width: 800px; margin: 0 auto;
            display: grid; gap: 10px;
            grid-template-columns: repeat(4, 1fr);
        }
        @media (max-width: 600px) {
            .grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
        }
        @media (max-width: 360px) {
            .grid { grid-template-columns: repeat(2, 1fr); gap: 6px; }
        }

        .grid-item {
            aspect-ratio: 1;
            border-radius: 16px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; position: relative;
            transition: transform 0.15s, filter 0.3s, opacity 0.3s;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .grid-item:active { transform: scale(0.94); }
        .grid-item .item-emoji {
            font-size: clamp(28px, 8vw, 44px); line-height: 1.2;
            transition: filter 0.3s;
        }
        .grid-item .item-name {
            font-size: clamp(10px, 2.5vw, 13px); color: rgba(255,255,255,0.9);
            font-weight: 600; margin-top: 2px; letter-spacing: 0.5px;
            transition: opacity 0.3s;
        }
        /* 已访问过的动物 - 透明度标记 */
        .grid-item.visited {
            opacity: 0.1;
        }

        /* 卡片弹出层 */
        .card-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 1000;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s;
        }
        .card-overlay.active { opacity: 1; pointer-events: auto; }
        .card-overlay .card-wrapper {
            flex-shrink: 0;
            width: 100%; max-width: 520px;
            max-height: 90vh; overflow-y: auto;
            margin: 0; padding: 0 12px;
            -webkit-overflow-scrolling: touch;
        }
        .card-overlay .card {
            width: 100%;
            background: var(--card-bg); border-radius: var(--radius);
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            display: flex; flex-direction: column;
        }
        .card-overlay .card-image {
            width: 100%; aspect-ratio: 3/4; max-height: 60vh;
        }
        .card-overlay .card-body {
            flex-shrink: 0; padding: 14px 24px 16px;
            text-align: left; position: relative;
        }
        .card-overlay .card-body .zh-name { padding-right: 60px; }
        .card-overlay .card-body .en-name { padding-right: 60px; }
        .card-overlay .btn-close {
            position: absolute; top: 10px; right: 10px; z-index: 10;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(0,0,0,0.5); border: none;
            color: #fff; font-size: 20px; line-height: 36px; text-align: center;
            cursor: pointer; backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
        }
        .card-overlay .btn-close:active { background: rgba(0,0,0,0.7); }

        /* 图片加载失败占位 */
        .img-fallback {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            width: 100%; height: 100%;
        }
        .fallback-emoji {
            font-size: clamp(50px, 12vw, 80px); line-height: 1; margin-bottom: 14px;
        }
        .fallback-retry {
            background: var(--card-bg); border: 2px solid var(--primary); color: var(--primary);
            font-size: 13px; padding: 7px 18px; border-radius: 50px;
            cursor: pointer; font-weight: 600; transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .fallback-retry:active { background: var(--primary); color: #fff; }

        /* 加载动画 */
        .loading-dot {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2000; font-size: 60px;
            animation: breathe 1.2s ease-in-out infinite;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
            display: none;
        }
        .loading-dot.show { display: block; opacity: 1; }
        @keyframes breathe {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.7; }
            50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="badge">浏览模式</div>
    <div class="category-title" style="display:none">动物</div>
    <div class="btn-group">
        <a class="btn-home" href="index.html">📚 首页</a>
        <button class="btn-refresh" id="btnRefresh" title="清除浏览记录">再来一次</button>
        <a class="btn-back" href="animal-cards.html">卡片模式</a>
        <button class="btn-offline-select" id="btnOfflineSelect" title="下载全部资源到本地">📡 离线</button>
    </div>
</div>

<div class="grid" id="grid"></div>

<!-- 卡片弹出层 -->
<div class="card-overlay" id="cardOverlay">
    <div class="card-wrapper">
        <div class="card" id="popCard">
            <div class="card-image" id="popCardImage">
                <button class="btn-close" id="btnClose">✕</button>
            </div>
            <div class="card-body">
                <div class="animal-emoji" id="popEmoji"></div>
                <div class="zh-name" id="popZhName"></div>
                <div class="en-name" id="popEnName"></div>
                <div class="fact" id="popFact"></div>
            </div>
        </div>
    </div>
</div>

<div class="loading-dot" id="loadingDot">🦁</div>

<script src="animal-data.js"></script>
<script src="image-interaction.js"></script>
<script src="common.js"></script>
<script>
registerSW();
// ========== DOM 引用 ==========
const gridEl = document.getElementById('grid');
const cardOverlay = document.getElementById('cardOverlay');
const popCardImage = document.getElementById('popCardImage');
const popEmoji = document.getElementById('popEmoji');
const popZhName = document.getElementById('popZhName');
const popEnName = document.getElementById('popEnName');
const popFact = document.getElementById('popFact');
const btnClose = document.getElementById('btnClose');
const loadingDot = document.getElementById('loadingDot');

// ========== 访问记录（localStorage） ==========
function getVisited() {
    try {
        var raw = localStorage.getItem('animal_select_visited');
        return raw ? JSON.parse(raw) : [];
    } catch(e) { return []; }
}
function markVisited(index) {
    var visited = getVisited();
    if (visited.indexOf(index) < 0) {
        visited.push(index);
        localStorage.setItem('animal_select_visited', JSON.stringify(visited));
    }
    updateVisitedClass();
}

function updateVisitedClass() {
    var visited = getVisited();
    var items = document.querySelectorAll('.grid-item');
    for (var i = 0; i < items.length; i++) {
        var idx = parseInt(items[i].getAttribute('data-index'));
        if (visited.indexOf(idx) >= 0) {
            items[i].classList.add('visited');
        }
    }
}

// ========== 提取 emoji 平均色 ==========
// 用 canvas 渲染 emoji，取非透明像素的平均色
var emojiColorCache = {};
function getEmojiAvgColor(emoji, callback) {
    if (emojiColorCache[emoji]) {
        callback(emojiColorCache[emoji]);
        return;
    }
    var canvas = document.createElement('canvas');
    canvas.width = 64; canvas.height = 64;
    var ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, 64, 64);
    ctx.font = '48px "Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(emoji, 32, 32);

    var imageData = ctx.getImageData(0, 0, 64, 64).data;
    var r = 0, g = 0, b = 0, count = 0;
    for (var i = 0; i < imageData.length; i += 4) {
        var alpha = imageData[i + 3];
        if (alpha > 50) {
            r += imageData[i];
            g += imageData[i + 1];
            b += imageData[i + 2];
            count++;
        }
    }
    var color;
    if (count > 0) {
        r = Math.round(r / count);
        g = Math.round(g / count);
        b = Math.round(b / count);
    } else {
        r = 180; g = 180; b = 180; // fallback
    }
    // 混合70%黑色
    r = Math.round(r * 0.3);
    g = Math.round(g * 0.3);
    b = Math.round(b * 0.3);
    color = 'rgb(' + r + ',' + g + ',' + b + ')';
    emojiColorCache[emoji] = color;
    callback(color);
}

// ========== 拼音排序 ==========
// 按中文名第一个字的拼音排序
var sortedOrder = [];
(function() {
    var indexed = animals.map(function(a, i) { return { idx: i, zh: a.zh }; });
    indexed.sort(function(a, b) {
        return a.zh.localeCompare(b.zh, 'zh-CN');
    });
    for (var i = 0; i < indexed.length; i++) {
        sortedOrder.push(indexed[i].idx);
    }
})();

// ========== 构建网格 ==========
function buildGrid(container, onClickHandler) {
    container.innerHTML = '';
    for (var i = 0; i < sortedOrder.length; i++) {
        (function(displayIdx) {
            var realIdx = sortedOrder[displayIdx];
            var a = animals[realIdx];
            var item = document.createElement('div');
            item.className = 'grid-item';
            item.setAttribute('data-index', realIdx);
            getEmojiAvgColor(a.emoji, function(color) {
                item.style.backgroundColor = color;
            });
            item.innerHTML = '<div class="item-emoji">' + a.emoji + '</div><div class="item-name">' + a.zh + '</div>';
            item.addEventListener('click', function() { onClickHandler(realIdx); });
            container.appendChild(item);
        })(i);
    }
}

// ========== 预加载单个动物的资源 ==========
function preloadAnimal(index) {
    return new Promise(function(resolve) {
        var a = animals[index];
        var urls = [];
        if (a.image) urls.push(a.image);
        if (a.speech_zh) urls.push(a.speech_zh);
        if (a.speech_en) urls.push(a.speech_en);
        if (a.speech_fact) urls.push(a.speech_fact);
        if (a.sound) urls.push(a.sound);

        if (urls.length === 0) { resolve(); return; }
        var pending = urls.length;
        function oneDone() { pending--; if (pending <= 0) resolve(); }
        for (var i = 0; i < urls.length; i++) {
            var url = urls[i];
            var isAudio = /\.(mp3|wav|ogg|m4a)(\?|$)/i.test(url);
            if (isAudio) {
                // 用 fetch 触发缓存，不再创建 Audio 对象
                fetch(url).then(oneDone).catch(oneDone);
                setTimeout(oneDone, 3000);
            } else {
                var img = new Image();
                img.src = url;
                img.onload = oneDone;
                img.onerror = oneDone;
                setTimeout(function() { if (!img.complete) oneDone(); }, 3000);
            }
        }
    });
}

// ========== 卡片弹出 ==========
var currentPopIndex = -1;


// 图片交互清理函数
var popImageCleanup = null;

function showCard(index) {
    currentPopIndex = index;
    var a = animals[index];
    loadingDot.textContent = a.emoji;
    loadingDot.classList.add('show');

    // 清理旧事件
    if (popImageCleanup) { popImageCleanup(); popImageCleanup = null; }

    preloadAnimal(index).then(function() {
        loadingDot.classList.remove('show');

        // 填充卡片内容
        popEmoji.textContent = a.emoji;
        popZhName.textContent = a.zh;
        popEnName.textContent = a.en;
        popFact.textContent = a.fact;

        // 清理旧交互
        if (popImageCleanup) { popImageCleanup(); popImageCleanup = null; }

        // 渲染图片
        popCardImage.className = 'card-image';
        popCardImage.style.backgroundColor = '';
        var srcset = '';
        popCardImage.innerHTML = '<img src="' + a.image + '" alt="' + a.zh + '" id="popImg"><button class="zoom-toggle" id="popZoomBtn" title="放大填充"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><line x1="20" y1="20" x2="16" y2="16"/></svg></button><button class="btn-close" id="btnClose2">✕</button>';
        var popImg = document.getElementById('popImg');
        var popZoomBtn = document.getElementById('popZoomBtn');
        var btnClose2 = document.getElementById('btnClose2');

        // 图片加载失败显示 emoji + 重试
        popImg.onerror = function() {
            popCardImage.innerHTML = '<div class="img-fallback"><div class="fallback-emoji">' + (a.emoji || '📷') + '</div><button class="fallback-retry" id="fallbackRetry">🔄 重新加载</button><button class="btn-close" id="btnClose3">✕</button></div>';
            document.getElementById('fallbackRetry').addEventListener('click', function(e) {
                e.stopPropagation();
                showCard(currentPopIndex);
            });
            document.getElementById('btnClose3').addEventListener('click', function(e) {
                e.stopPropagation();
                closeCard();
            });
        };

        // 初始化图片交互模块
        popImageCleanup = initImageInteraction({
            container: popCardImage,
            img: popImg,
            zoomBtn: popZoomBtn
        });

        cardOverlay.classList.add('active');
        markVisited(index);
        updateVisitedClass();

        // 自动朗读
        setTimeout(function() { speak('zh', a); }, 400);
    });
}

function closeCard() {
    cardOverlay.classList.remove('active');
    // 更新主网格的 visited 状态
    updateVisitedClass();
}

// 卡片弹出层事件：只注册一次（避免每次 showCard 重复添加监听器）
btnClose.addEventListener('click', function(e) {
    e.stopPropagation();
    closeCard();
});
// 点击 overlay 空白区域关闭
cardOverlay.addEventListener('click', function(e) {
    if (e.target === cardOverlay) closeCard();
});
// 动态关闭按钮（btnClose2 每次渲染都会重建，用事件代理）
popCardImage.addEventListener('click', function(e) {
    if (e.target.closest && e.target.closest('.btn-close')) {
        e.stopPropagation();
        closeCard();
    }
});

// 点击卡片文字/emoji发音
document.getElementById('popCard').addEventListener('click', function(e) {
    var target = e.target;
    if (currentPopIndex < 0) return;
    var a = animals[currentPopIndex];
    if (target === popZhName) { speak('zh', a); }
    else if (target === popEnName) { speak('en', a); }
    else if (target === popFact) { speak('fact', a); }
    else if (target === popEmoji) { playAnimalSound(a); }
});

// ========== 再来一次 ==========
document.getElementById('btnRefresh').addEventListener('click', function() {
    localStorage.removeItem('animal_select_visited');
    var items = document.querySelectorAll('.grid-item');
    for (var i = 0; i < items.length; i++) {
        items[i].classList.remove('visited');
    }
});

// ========== 启动 ==========
buildGrid(gridEl, function(idx) {
    showCard(idx);
});
updateVisitedClass();

// ========== 离线运行按钮（使用 common.js 通用逻辑） ==========
initOfflineButton(document.getElementById('btnOfflineSelect'), { defaultText: '📡 离线', notReadyText: '⚠️ 请刷新' });
</script>
</body>
</html>
