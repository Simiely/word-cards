<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>动物卡片学习 - Animal Flashcards</title>
    <style>
        :root {
            --bg: #f5f0e8;
            --card-bg: #ffffff;
            --primary: #4a7c59;
            --accent: #e8a87c;
            --text: #3c3c3c;
            --radius: 24px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Segoe UI','PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(74,124,89,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(232,168,124,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(74,124,89,0.04) 0%, transparent 50%);
            display: flex; align-items: center; justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            width: 100%; max-width: 520px;
            height: 100dvh; height: 100svh;
            display: flex; flex-direction: column; align-items: center;
            padding: calc(12px + var(--safe-top)) 16px calc(12px + var(--safe-bottom)) 16px;
        }
        .header { text-align: center; flex-shrink: 0; padding: 4px 0 2px; }
        .header .badge {
            display: inline-block; background: var(--primary); color: #fff;
            font-size: 13px; padding: 4px 16px; border-radius: 20px; letter-spacing: 0.5px;
        }
        .header .counter { font-size: 13px; color: #999; font-weight: 500; margin-top: 4px; }

        .card {
            width: 100%; flex: 1 1 auto; min-height: 0;
            background: var(--card-bg); border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.08); overflow: hidden;
            display: flex; flex-direction: column; margin: 10px 0;
        }

        .card-image {
            width: 100%; flex: 1 1 auto; min-height: 0;
            aspect-ratio: 3 / 4; max-height: 100%;
            overflow: hidden; background: #eef2e6; position: relative;
            touch-action: none;
        }
        .card-image.zoom-mode { cursor: grab; }
        .card-image.zoom-mode.dragging { cursor: grabbing; }
        .card-image img {
            position: absolute; display: block;
            width: 100%; height: 100%;
            object-fit: contain;
            transition: opacity 0.35s ease, transform 0.3s ease;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
        .card-image.zoom-mode img {
            width: auto; height: auto;
            object-fit: unset;
        }
        .card-image img.switching { opacity: 0; }

        /* 缩放切换按钮 */
        .zoom-toggle {
            position: absolute; bottom: 12px; right: 12px; z-index: 10;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(0,0,0,0.45); border: none;
            color: #fff; font-size: 18px; line-height: 36px; text-align: center;
            cursor: pointer; backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: all 0.25s; display: flex;
            align-items: center; justify-content: center;
            padding: 0;
        }
        .zoom-toggle:active { transform: scale(0.9); background: rgba(0,0,0,0.65); }
        .zoom-toggle svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; }
        .zoom-toggle.hidden { display: none; }

        .card-image.no-images {
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .card-image.no-images .placeholder { text-align: center; }
        .card-image.no-images .placeholder .ph-emoji {
            font-size: clamp(80px, 18vw, 140px); display: block; line-height: 1;
        }
        .card-image.no-images .placeholder .ph-text {
            font-size: 11px; letter-spacing: 1px; color: #c0c0c0; margin-top: 4px;
        }

        .card-body {
            flex-shrink: 0; padding: 14px 24px 16px;
            text-align: left; min-height: 120px;
            display: flex; flex-direction: column; justify-content: center;
            position: relative;
        }
        .card-body .animal-emoji {
            position: absolute; top: 14px; right: 24px;
            font-size: clamp(36px, 7vw, 48px); line-height: 1;
            pointer-events: none; opacity: 0.85;
        }
        .card-body .zh-name {
            font-size: clamp(28px, 5vw, 36px); font-weight: 700; color: var(--text);
            cursor: pointer; line-height: 1.3; min-height: 1.3em; padding-right: 60px;
            position: relative;
        }
        .card-body .zh-name:active { color: var(--primary); }
        .copy-tip {
            position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff; font-size: 12px;
            padding: 3px 10px; border-radius: 10px; white-space: nowrap;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        .copy-tip.show { opacity: 1; }
        .copy-tip.show { opacity: 1; }
        .card-body .en-name {
            font-size: clamp(17px, 3.5vw, 20px); font-weight: 400; color: #888;
            cursor: pointer; margin-top: 8px; line-height: 1.4; min-height: 1.4em;
            padding-right: 60px; position: relative;
        }
        .card-body .en-name:active { color: var(--accent); }
        .card-body .fact {
            font-size: clamp(12px, 2.2vw, 14px); color: #888; margin-top: 12px;
            line-height: 1.65; cursor: pointer;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden; padding-right: 4px;
        }
        .card-body .fact:active { color: var(--primary); }

        .nav {
            flex-shrink: 0; display: flex; gap: 10px; align-items: center;
            width: 100%; justify-content: center; padding: 4px 0;
        }
        .nav button {
            background: var(--card-bg); border: 2px solid #e0dcd4;
            color: var(--text); font-size: 15px; padding: 11px 22px;
            border-radius: 50px; cursor: pointer; transition: all 0.2s;
            font-weight: 600; letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            white-space: nowrap; -webkit-tap-highlight-color: transparent;
        }
        .nav button:active { border-color: var(--primary); color: var(--primary); transform: scale(0.95); }
        .nav .btn-random { border-color: var(--accent); color: var(--accent); }
        .nav .btn-random:active { background: var(--accent); color: #fff; }

        @media (min-width: 640px) {
            .container { max-width: 480px; padding: 24px 16px; }
            .card { max-height: 700px; }
            .card-image { aspect-ratio: auto; max-height: 420px; }
            .card-body { min-height: 130px; }
        }
        @media (min-height: 850px) and (min-width: 400px) {
            .card-body { padding: 18px 28px 20px; min-height: 130px; }
            .nav button { padding: 13px 26px; font-size: 16px; }
        }
        @media (max-height: 700px) {
            .header { padding: 2px 0; }
            .header .badge { font-size: 11px; padding: 3px 12px; }
            .header .counter { font-size: 11px; }
            .card { margin: 6px 0; }
            .card-body { padding: 10px 16px 12px; min-height: 100px; }
            .card-body .fact { -webkit-line-clamp: 2; }
            .nav button { padding: 9px 16px; font-size: 13px; }
            .nav { gap: 8px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="badge">动物卡片学习</div>
        <div class="counter"><span id="currentIdx">1</span> / <span id="totalCount">20</span></div>
    </div>
    <div class="card" id="card">
        <div class="card-image" id="cardImage"></div>
        <div class="card-body">
            <div class="animal-emoji" id="animalEmoji"></div>
            <div class="zh-name" id="zhName" onclick="speakAndCopy('zh')"></div>
            <div class="en-name" id="enName" onclick="speakAndCopy('en')"></div>
            <div class="fact" id="fact" onclick="speak('fact')"></div>
        </div>
    </div>
    <div class="nav">
        <button onclick="goTo(currentIndex - 1)">← 上一个</button>
        <button class="btn-random" onclick="goRandom()">🎲 随机</button>
        <button onclick="goTo(currentIndex + 1)">下一个 →</button>
    </div>
</div>

<script>
// ============================================================
// 图片和声音文件路径说明：
// 图片放在 animal/images/ 目录，命名格式: {动物英文}.jpg
// 声音放在 animal/sounds_normalized/ 目录，命名格式: {动物英文}.mp3
// ============================================================

const animals = [
    { zh:'狮子',   en:'Lion',      emoji:'🦁', sound:'', image:'animal/images/lion.jpg',
      fact:'狮子是唯一群居的猫科动物，一个狮群通常由1-2头雄狮和数头母狮组成。雄狮的鬃毛越浓密越受母狮青睐。' },
    { zh:'大象',   en:'Elephant',  emoji:'🐘', sound:'', image:'animal/images/elephant.jpg',
      fact:'大象是陆地上最大的哺乳动物。它们的鼻子由超过4万块肌肉组成，既能拔起大树也能捡起一粒花生。' },
    { zh:'熊猫',   en:'Panda',     emoji:'🐼', sound:'', image:'animal/images/panda.jpg',
      fact:'大熊猫是中国国宝，虽然属于食肉目，但99%的食物都是竹子，每天要花12-16小时进食。' },
    { zh:'老虎',   en:'Tiger',     emoji:'🐯', sound:'', image:'animal/images/tiger.jpg',
      fact:'老虎是世界上最大的猫科动物，每只老虎身上的条纹都是独一无二的，就像人类的指纹一样。' },
    { zh:'长颈鹿', en:'Giraffe',   emoji:'🦒', sound:'', image:'animal/images/giraffe.jpg',
      fact:'长颈鹿是地球上最高的陆地动物，脖子虽然很长，但颈椎骨数量和人类一样都是7块。' },
    { zh:'斑马',   en:'Zebra',     emoji:'🦓', sound:'', image:'animal/images/zebra.jpg',
      fact:'斑马的黑白条纹不仅是伪装，还能防蚊虫叮咬。每只斑马的条纹图案都是独一无二的。' },
    { zh:'企鹅',   en:'Penguin',   emoji:'🐧', sound:'', image:'animal/images/penguin.jpg',
      fact:'企鹅是鸟类中的游泳高手，帝企鹅可以潜入500米深的海水中，憋气超过20分钟。' },
    { zh:'海豚',   en:'Dolphin',   emoji:'🐬', sound:'', image:'animal/images/dolphin.jpg',
      fact:'海豚是非常聪明的海洋哺乳动物，它们用超声波定位和交流，睡觉时大脑一半休息一半保持清醒。' },
    { zh:'猴子',   en:'Monkey',    emoji:'🐵', sound:'', image:'animal/images/monkey.jpg',
      fact:'猴子是灵长类动物中种类最丰富的一类，它们有复杂的社会结构，会使用工具和互相梳理毛发。' },
    { zh:'兔子',   en:'Rabbit',    emoji:'🐰', sound:'', image:'animal/images/rabbit.jpg',
      fact:'兔子的耳朵可以旋转270度，帮助它们听到远处的危险。它们高兴时会跳起来在空中转身，这叫"binky"。' },
    { zh:'猫',     en:'Cat',       emoji:'🐱', sound:'', image:'animal/images/cat.jpg',
      fact:'猫是世界上最受欢迎的宠物之一。它们呼噜呼噜的声音不仅能表示开心，还能帮助骨骼愈合。' },
    { zh:'狗',     en:'Dog',       emoji:'🐶', sound:'', image:'animal/images/dog.jpg',
      fact:'狗是人类最早驯化的动物，它们的嗅觉比人类灵敏1万到10万倍，能嗅出疾病和情绪变化。' },
    { zh:'马',     en:'Horse',     emoji:'🐴', sound:'', image:'animal/images/horse.jpg',
      fact:'马可以站着睡觉，但需要躺下才能进入深度睡眠。它们的视野几乎达到360度。' },
    { zh:'牛',     en:'Cow',       emoji:'🐮', sound:'', image:'animal/images/cow.jpg',
      fact:'牛有四个胃室来消化草料，它们能看到颜色，而且对红色其实并不敏感。' },
    { zh:'羊',     en:'Sheep',     emoji:'🐑', sound:'', image:'animal/images/sheep.jpg',
      fact:'绵羊有极好的记忆力，能记住50多张面孔长达两年。它们还能通过面部表情识别同伴的情绪。' },
    { zh:'鸡',     en:'Chicken',   emoji:'🐔', sound:'', image:'animal/images/chicken.jpg',
      fact:'鸡是世界上最常见的鸟类，全球养殖数量超过250亿只。它们能用超过30种不同的叫声来交流。' },
    { zh:'鸭',     en:'Duck',      emoji:'🦆', sound:'', image:'animal/images/duck.jpg',
      fact:'鸭子的脚掌不会感到冷，因为它们脚上的血管排列特殊，能回收热量。小鸭子会把出生后看到的第一个移动物体当妈妈。' },
    { zh:'鱼',     en:'Fish',      emoji:'🐟', sound:'', image:'animal/images/fish.jpg',
      fact:'鱼类是地球上最古老的脊椎动物，已经存在超过5亿年。有些鱼能改变性别，有些能发电。' },
    { zh:'蝴蝶',   en:'Butterfly', emoji:'🦋', sound:'', image:'animal/images/butterfly.jpg',
      fact:'蝴蝶用脚来尝味道！它们的翅膀上覆盖着细小的鳞片，这些鳞片能反射光线产生绚丽的色彩。' },
    { zh:'青蛙',   en:'Frog',      emoji:'🐸', sound:'', image:'animal/images/frog.jpg',
      fact:'青蛙的皮肤可以吸收水分和氧气，所以它们对环境污染特别敏感。它们是环境健康的"指示物种"。' },
    { zh:'鲨鱼',   en:'Shark',     emoji:'🦈', sound:'', image:'animal/images/shark.jpg',
      fact:'鲨鱼比恐龙出现的时间还早，已经在地球上生存超过4亿年。它们一生会换掉超过3万颗牙齿。' }
];

let currentIndex = 0;

const cardImage = document.getElementById('cardImage');
const zhNameEl = document.getElementById('zhName');
const enNameEl = document.getElementById('enName');
const factEl = document.getElementById('fact');
const currentIdxEl = document.getElementById('currentIdx');
const totalCountEl = document.getElementById('totalCount');
const animalEmojiEl = document.getElementById('animalEmoji');

// ========== 音效 ==========
function playAnimalSound() {
    const animal = animals[currentIndex];
    if (!animal.sound) return;
    const audio = new Audio(animal.sound);
    audio.volume = 0.8;
    audio.play().catch(() => {});
}

// ========== 语音朗读 ==========
function speak(lang) {
    const animal = animals[currentIndex];
    let text;
    if (lang === 'zh') text = animal.zh;
    else if (lang === 'en') text = animal.en;
    else if (lang === 'fact') text = animal.fact;
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang === 'en' ? 'en-US' : 'zh-CN';
    u.rate = 0.85;
    speechSynthesis.cancel();
    speechSynthesis.speak(u);
}

// ========== 朗读+复制 ==========
function speakAndCopy(lang) {
    speak(lang);
    const animal = animals[currentIndex];
    const text = lang === 'zh' ? animal.zh : animal.en;
    const el = lang === 'zh' ? zhNameEl : enNameEl;
    navigator.clipboard.writeText(text).catch(() => {});
    // 显示复制提示气泡
    let tip = el.querySelector('.copy-tip');
    if (!tip) {
        tip = document.createElement('span');
        tip.className = 'copy-tip';
        tip.textContent = '已复制';
        el.appendChild(tip);
    }
    tip.classList.add('show');
    clearTimeout(el._copyTimer);
    el._copyTimer = setTimeout(() => tip.classList.remove('show'), 1000);
}

// ========== 图片渲染 + 拖拽 + 双指缩放 + 缩放切换 ==========
let zoomEnabled = false;
let dragAxis = null, offsetX = 0, offsetY = 0;
let zoomScale = 1;      // 当前缩放倍率（相对于 cover 状态的基准）
let baseScale = 1;      // cover 状态下的基准缩放比例
let cardImg = null;

function getImgBaseSize() {
    if (!cardImg || !cardImg.naturalWidth) return { w: 0, h: 0 };
    const cw = cardImage.clientWidth;
    const ch = cardImage.clientHeight;
    const iw = cardImg.naturalWidth;
    const ih = cardImg.naturalHeight;
    baseScale = Math.max(cw / iw, ch / ih);
    return { w: iw * baseScale, h: ih * baseScale };
}

function applyImgSize() {
    if (!cardImg) return;
    const { w, h } = getImgBaseSize();
    const sw = w * zoomScale;
    const sh = h * zoomScale;
    const cw = cardImage.clientWidth;
    const ch = cardImage.clientHeight;
    cardImg.style.width = sw + 'px';
    cardImg.style.height = sh + 'px';
    cardImg.style.left = ((cw - sw) / 2) + 'px';
    cardImg.style.top = ((ch - sh) / 2) + 'px';
}

function clampAllOffsets() {
    if (!cardImg) return;
    const cw = cardImage.clientWidth;
    const ch = cardImage.clientHeight;
    const imgW = parseFloat(cardImg.style.width) || cw;
    const imgH = parseFloat(cardImg.style.height) || ch;
    const maxDX = Math.max(0, (imgW - cw) / 2);
    const maxDY = Math.max(0, (imgH - ch) / 2);
    offsetX = Math.max(-maxDX, Math.min(maxDX, offsetX));
    offsetY = Math.max(-maxDY, Math.min(maxDY, offsetY));
    applyOffset();
}

function setZoomMode(on) {
    zoomEnabled = on;
    if (on) {
        cardImage.classList.add('zoom-mode');
        zoomScale = 1;
        offsetX = 0; offsetY = 0;
        applyImgSize();
        if (cardImg) { cardImg.style.transition = 'transform 0.3s ease'; cardImg.style.transform = ''; }
        updateZoomIcon();
    } else {
        cardImage.classList.remove('zoom-mode', 'dragging');
        zoomScale = 1;
        offsetX = 0; offsetY = 0;
        if (cardImg) {
            cardImg.style.transition = 'transform 0.3s ease';
            cardImg.style.transform = '';
            cardImg.style.width = '100%';
            cardImg.style.height = '100%';
            cardImg.style.left = '0';
            cardImg.style.top = '0';
        }
        dragAxis = null;
        updateZoomIcon();
    }
}

function updateZoomIcon() {
    const btn = cardImage.querySelector('.zoom-toggle');
    if (!btn) return;
    if (zoomEnabled) {
        btn.innerHTML = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/></svg>`;
        btn.title = '缩小查看完整图片';
    } else {
        btn.innerHTML = `<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><line x1="20" y1="20" x2="16" y2="16"/></svg>`;
        btn.title = '放大填充';
    }
}

function applyOffset() {
    if (!cardImg) return;
    cardImg.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
}

function getOverflowAxis() {
    if (!cardImg) return 'none';
    const cw = cardImage.clientWidth;
    const ch = cardImage.clientHeight;
    const imgW = parseFloat(cardImg.style.width) || cw;
    const imgH = parseFloat(cardImg.style.height) || ch;
    const overflowX = imgW > cw + 2;
    const overflowY = imgH > ch + 2;
    if (overflowX && overflowY) return 'both';
    if (overflowX) return 'x';
    if (overflowY) return 'y';
    return 'none';
}

function onDragStart() {
    if (!zoomEnabled) return;
    dragAxis = null;
    if (cardImg) cardImg.style.transition = 'none';
}

function onDragMove(ex, ey, prevX, prevY) {
    if (!zoomEnabled) return;
    const dx = ex - prevX;
    const dy = ey - prevY;

    if (dragAxis === null && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
        const axis = getOverflowAxis();
        if (axis === 'both') dragAxis = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
        else if (axis === 'x') dragAxis = 'x';
        else if (axis === 'y') dragAxis = 'y';
        else dragAxis = 'none';
    }

    if (dragAxis === 'x') offsetX += dx;
    else if (dragAxis === 'y') offsetY += dy;
    else return;

    clampAllOffsets();
    return { x: ex, y: ey };
}

function onDragEnd() {
    if (!zoomEnabled) return;
    if (cardImg) cardImg.style.transition = 'transform 0.15s ease';
    dragAxis = null;
}

// ========== 双指缩放 ==========
let pinchStartDist = 0;
let pinchStartScale = 1;
let pinchCenterX = 0, pinchCenterY = 0;
let pinchStartOffsetX = 0, pinchStartOffsetY = 0;

function getTouchDist(t1, t2) {
    return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
}

function getTouchCenter(t1, t2) {
    return {
        x: (t1.clientX + t2.clientX) / 2,
        y: (t1.clientY + t2.clientY) / 2
    };
}

function onPinchStart(t1, t2) {
    if (!zoomEnabled) return;
    pinchStartDist = getTouchDist(t1, t2);
    pinchStartScale = zoomScale;
    pinchStartOffsetX = offsetX;
    pinchStartOffsetY = offsetY;
    const c = getTouchCenter(t1, t2);
    pinchCenterX = c.x; pinchCenterY = c.y;
    if (cardImg) cardImg.style.transition = 'none';
}

function onPinchMove(t1, t2) {
    if (!zoomEnabled || pinchStartDist === 0) return;
    const newDist = getTouchDist(t1, t2);
    const ratio = newDist / pinchStartDist;
    const newScale = Math.max(0.5, Math.min(4, pinchStartScale * ratio));

    // 以双指中心为锚点缩放
    const c = getTouchCenter(t1, t2);
    const rect = cardImage.getBoundingClientRect();
    const anchorX = c.x - rect.left;
    const anchorY = c.y - rect.top;
    const imgRect = cardImg.getBoundingClientRect();
    const imgCX = imgRect.left + imgRect.width / 2;
    const imgCY = imgRect.top + imgRect.height / 2;
    const relX = anchorX - imgCX;
    const relY = anchorY - imgCY;

    const scaleChange = newScale / zoomScale;
    zoomScale = newScale;
    applyImgSize();

    offsetX = pinchStartOffsetX - relX * (scaleChange - 1);
    offsetY = pinchStartOffsetY - relY * (scaleChange - 1);
    clampAllOffsets();
}

function onPinchEnd() {
    pinchStartDist = 0;
    if (cardImg) cardImg.style.transition = 'transform 0.15s ease';
}

function renderImage() {
    const animal = animals[currentIndex];
    const hasImage = animal.image && animal.image.length > 0;
    zoomEnabled = false;
    zoomScale = 1;
    dragAxis = null;
    offsetX = 0; offsetY = 0;

    if (!hasImage) {
        cardImage.className = 'card-image no-images';
        cardImage.innerHTML = `
            <div class="placeholder">
                <div class="ph-emoji">${animal.emoji || '📷'}</div>
                <div class="ph-text">待添加图片</div>
            </div>`;
        cardImage.ontouchstart = null;
        cardImage.ontouchmove = null;
        cardImage.ontouchend = null;
        cardImage.onmousedown = null;
        cardImg = null;
        return;
    }

    cardImage.className = 'card-image';
    cardImage.style.backgroundColor = '';
    cardImage.innerHTML = `
        <img src="${animal.image}" alt="${animal.zh}" id="cardImg">
        <button class="zoom-toggle" id="zoomToggle" title="放大填充">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><line x1="20" y1="20" x2="16" y2="16"/></svg>
        </button>`;

    cardImg = document.getElementById('cardImg');
    const zoomBtn = document.getElementById('zoomToggle');

    // 图片加载后提取边缘平均色设为容器背景
    cardImg.addEventListener('load', function() {
        if (!cardImg.naturalWidth) return;
        try {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const iw = cardImg.naturalWidth, ih = cardImg.naturalHeight;
            canvas.width = iw; canvas.height = ih;
            ctx.drawImage(cardImg, 0, 0, iw, ih);

            // 取最外围一圈像素
            const top = ctx.getImageData(0, 0, iw, 1).data;
            const bottom = ctx.getImageData(0, ih-1, iw, 1).data;
            const left = ctx.getImageData(0, 0, 1, ih).data;
            const right = ctx.getImageData(iw-1, 0, 1, ih).data;

            let r = 0, g = 0, b = 0, count = 0;
            const add = (data) => {
                for (let i = 0; i < data.length; i += 4) {
                    r += data[i]; g += data[i+1]; b += data[i+2]; count++;
                }
            };
            add(top); add(bottom); add(left); add(right);
            r = Math.round(r / count);
            g = Math.round(g / count);
            b = Math.round(b / count);

            cardImage.style.backgroundColor = `rgb(${r},${g},${b})`;
        } catch(e) {}
    });

    zoomBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        setZoomMode(!zoomEnabled);
    });

    zoomBtn.addEventListener('pointerdown', function(e) {
        e.stopPropagation();
    });

    // === 鼠标拖拽 ===
    let mouseDown = false, lastMX = 0, lastMY = 0;
    cardImage.onmousedown = function(e) {
        if (e.button !== 0) return;
        if (e.target === zoomBtn) return;
        mouseDown = true;
        lastMX = e.clientX; lastMY = e.clientY;
        onDragStart();
        if (zoomEnabled) { cardImage.classList.add('dragging'); e.preventDefault(); }
    };

    // === 触摸拖拽 + 双指缩放 ===
    let touchId = null, lastTX = 0, lastTY = 0;
    let pinchActive = false;

    cardImage.ontouchstart = function(e) {
        if (e.target === zoomBtn) return;
        if (e.touches.length === 2) {
            // 双指缩放
            touchId = null;
            pinchActive = true;
            onPinchStart(e.touches[0], e.touches[1]);
            return;
        }
        if (e.touches.length !== 1) { touchId = null; pinchActive = false; return; }
        pinchActive = false;
        pinchStartDist = 0;
        const t = e.touches[0];
        touchId = t.identifier;
        lastTX = t.clientX; lastTY = t.clientY;
        onDragStart();
    };
    cardImage.ontouchmove = function(e) {
        if (e.touches.length === 2 && pinchActive) {
            onPinchMove(e.touches[0], e.touches[1]);
            e.preventDefault();
            return;
        }
        if (touchId === null || pinchActive) return;
        const t = Array.from(e.touches).find(tt => tt.identifier === touchId);
        if (!t) return;
        const result = onDragMove(t.clientX, t.clientY, lastTX, lastTY);
        if (result) { lastTX = result.x; lastTY = result.y; }
        if (dragAxis && dragAxis !== 'none') e.preventDefault();
    };
    cardImage.ontouchend = function(e) {
        if (pinchActive && e.touches.length < 2) {
            pinchActive = false;
            onPinchEnd();
            return;
        }
        if (touchId === null) return;
        const remaining = Array.from(e.touches).find(tt => tt.identifier === touchId);
        if (remaining) return;
        touchId = null;
        onDragEnd();
        cardImage.classList.remove('dragging');
    };

    // === 全局鼠标移动/释放 ===
    const onMM = function(e) {
        if (!mouseDown) return;
        const result = onDragMove(e.clientX, e.clientY, lastMX, lastMY);
        if (result) { lastMX = result.x; lastMY = result.y; }
    };
    const onMU = function() {
        if (!mouseDown) return;
        mouseDown = false;
        onDragEnd();
        cardImage.classList.remove('dragging');
    };
    window.addEventListener('mousemove', onMM);
    window.addEventListener('mouseup', onMU);

    // 清理旧监听（通过闭包持有引用，下次 renderImage 时自动失效）
    cardImage._cleanup = function() {
        window.removeEventListener('mousemove', onMM);
        window.removeEventListener('mouseup', onMU);
    };

    // 点击：没拖动时播放叫声
    let didDrag = false;
    cardImage.addEventListener('pointerdown', function(e) {
        if (e.target === zoomBtn) return;
        didDrag = false;
    });
    cardImage.addEventListener('pointermove', function() {
        if (dragAxis && dragAxis !== 'none') didDrag = true;
    });
    cardImage.addEventListener('pointerup', function(e) {
        if (e.target === zoomBtn) return;
        if (!didDrag) playAnimalSound();
    });
}

// ========== 卡片渲染 ==========
function renderCard() {
    const a = animals[currentIndex];
    zhNameEl.textContent = a.zh;
    enNameEl.textContent = a.en;
    factEl.textContent = a.fact;
    currentIdxEl.textContent = currentIndex + 1;
    totalCountEl.textContent = animals.length;
    animalEmojiEl.textContent = a.emoji || '';
    renderImage();
}

// ========== 导航 ==========
function goTo(idx) {
    if (idx < 0) idx = animals.length - 1;
    if (idx >= animals.length) idx = 0;
    currentIndex = idx;
    renderCard();
    setTimeout(() => speak('zh'), 300);
}

function goRandom() {
    let ni;
    do { ni = Math.floor(Math.random() * animals.length); }
    while (ni === currentIndex && animals.length > 1);
    goTo(ni);
}

document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
    if (e.key === 'ArrowRight') goTo(currentIndex + 1);
    if (e.key === ' ') { e.preventDefault(); goRandom(); }
});

// ========== 启动 ==========
renderCard();
</script>
</body>
</html>
