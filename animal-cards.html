<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://simiely.github.io">
    <meta name="theme-color" content="#4a7c59">
    <title>卡片模式 - Animal Flashcards</title>
    <link rel="stylesheet" href="common.css">
    <style>
        html, body { height: 100%; overflow: hidden; }
        body {
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(74,124,89,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(232,168,124,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(74,124,89,0.04) 0%, transparent 50%);
            display: flex; align-items: center; justify-content: center;
        }
        .container {
            width: 100%; max-width: 100%;
            height: 100dvh; height: 100svh;
            display: flex; flex-direction: column; align-items: center;
            padding: calc(12px + var(--safe-top)) 16px calc(12px + var(--safe-bottom)) 16px;
        }
        .header { flex-shrink: 0; width: 100%; text-align: center; }
        .header-top {
            display: flex; align-items: center; justify-content: space-between;
            padding: 4px 0; position: relative;
        }
        .header .badge {
            display: inline-block; background: var(--primary); color: #fff;
            font-size: 14px; padding: 8px 18px; border-radius: 20px; letter-spacing: 0.5px;
            flex-shrink: 0; font-weight: 600;
        }
        .header .category-title {
            font-size: clamp(20px, 4.5vw, 26px); font-weight: 700; color: var(--text);
            letter-spacing: 1px; position: absolute; left: 50%; transform: translateX(-50%);
            pointer-events: none;
        }
        .header .btn-select {
            display: inline-block; background: var(--card-bg); color: var(--text);
            font-size: 14px; padding: 8px 18px; border-radius: 20px;
            border: 2px solid #e0dcd4; cursor: pointer; text-decoration: none;
            transition: all 0.2s; font-weight: 600; white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .header .btn-select:active { border-color: var(--primary); color: var(--primary); }
        .header .btn-group {
            display: flex; gap: 8px; flex-shrink: 0;
        }
        .header .btn-home {
            display: inline-block; background: var(--card-bg); color: var(--text);
            font-size: 14px; padding: 8px 18px; border-radius: 20px;
            border: 2px solid #e0dcd4; cursor: pointer; text-decoration: none;
            font-weight: 600; transition: all 0.2s; white-space: nowrap;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .header .btn-home:active { border-color: var(--primary); color: var(--primary); }

        .card {
            width: 100%; flex: 1 1 auto; min-height: 0;
            background: var(--card-bg); border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.08); overflow: hidden;
            display: flex; flex-direction: column; margin: 10px 0;
        }

        .card-image {
            width: 100%; flex: 1 1 auto; min-height: 0;
            aspect-ratio: 3 / 4; max-height: 100%;
        }
        .card-image img.switching { opacity: 0; }
        .zoom-toggle.hidden { display: none; }

        .card-image.no-images {
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .card-image.no-images .placeholder { text-align: center; }
        .card-image.no-images .placeholder .ph-emoji {
            font-size: clamp(80px, 18vw, 140px); display: block; line-height: 1;
        }
        .card-image.no-images .placeholder .ph-text {
            font-size: 11px; letter-spacing: 1px; color: #c0c0c0; margin-top: 4px;
        }

        .card-body {
            flex-shrink: 0; padding: 14px 24px 16px;
            text-align: left; min-height: 120px;
            display: flex; flex-direction: column; justify-content: center;
            position: relative;
        }
        .card-body .zh-name {
            min-height: 1.3em; padding-right: 60px; position: relative;
        }
        .copy-tip {
            position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff; font-size: 12px;
            padding: 3px 10px; border-radius: 10px; white-space: nowrap;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        .copy-tip.show { opacity: 1; }
        .card-body .en-name {
            min-height: 1.4em; padding-right: 60px; position: relative;
        }
        .card-body .fact {
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden; padding-right: 4px;
        }

        .nav {
            flex-shrink: 0; display: flex; gap: 10px; align-items: center;
            width: 100%; justify-content: center; padding: 4px 0;
        }
        .nav button {
            background: var(--card-bg); border: 2px solid #e0dcd4;
            color: var(--text); font-size: 15px; padding: 11px 22px;
            border-radius: 50px; cursor: pointer; transition: all 0.2s;
            font-weight: 600; letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            white-space: nowrap; -webkit-tap-highlight-color: transparent;
        }
        .nav button:active { border-color: var(--primary); color: var(--primary); transform: scale(0.95); }
        .nav .btn-random { border-color: var(--accent); color: var(--accent); }
        .nav .btn-random:active { background: var(--accent); color: #fff; }
        .nav .btn-offline {
            background: #e8f0fe; border-color: #4285f4; color: #1a56c4;
            font-size: 13px; padding: 8px 16px;
        }
        .nav .btn-offline:active { background: #4285f4; color: #fff; }

        /* 图片加载失败占位 */
        .img-fallback {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            width: 100%; height: 100%;
        }
        .fallback-emoji {
            font-size: clamp(60px, 14vw, 100px); line-height: 1; margin-bottom: 16px;
        }
        .fallback-retry {
            background: var(--card-bg); border: 2px solid var(--primary); color: var(--primary);
            font-size: 14px; padding: 8px 20px; border-radius: 50px;
            cursor: pointer; font-weight: 600; transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .fallback-retry:active { background: var(--primary); color: #fff; }

        @media (min-width: 640px) {
            .card-body { min-height: 130px; }
        }
        @media (min-height: 850px) and (min-width: 400px) {
            .card-body { padding: 18px 28px 20px; min-height: 130px; }
            .nav button { padding: 13px 26px; font-size: 16px; }
        }
        @media (max-height: 700px) {
            .header-top { padding: 1px 0; }
            .header .badge { font-size: 12px; padding: 6px 14px; }
            .header .category-title { font-size: 18px; }
            .header .btn-select { font-size: 12px; padding: 6px 14px; }
            .header .btn-home { font-size: 12px; padding: 6px 14px; }
            .header .counter { font-size: 11px; }
            .card { margin: 6px 0; }
            .card-body { padding: 10px 16px 12px; min-height: 100px; }
            .card-body .fact { -webkit-line-clamp: 2; }
            .nav button { padding: 9px 16px; font-size: 13px; }
            .nav { gap: 8px; }
        }

        /* ========== 加载动画遮罩 ========== */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loading-overlay.fade-out { opacity: 0; pointer-events: none; }
        .loading-overlay.hidden { display: none; }
        .loading-emoji {
            font-size: 80px;
            animation: breathe 1.2s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>

<!-- 加载动画遮罩 -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-emoji" id="loadingEmoji">🦁</div>
</div>

<div class="container">
    <div class="header">
        <div class="header-top">
            <div class="badge">卡片模式</div>
            <div class="category-title" style="display:none">动物</div>
            <div class="btn-group">
                <a class="btn-home" href="index.html">📚 首页</a>
                <a class="btn-select" href="animal-select.html">浏览模式</a>
            </div>
        </div>
        <div class="counter"><span id="currentIdx">1</span> / <span id="totalCount">-</span></div>
    </div>
    <div class="card" id="card">
        <div class="card-image" id="cardImage"></div>
        <div class="card-body">
            <div class="animal-emoji" id="animalEmoji"></div>
            <div class="zh-name" id="zhName"></div>
            <div class="en-name" id="enName"></div>
            <div class="fact" id="fact"></div>
        </div>
    </div>
    <div class="nav">
        <button onclick="goTo(currentIndex - 1)">← 上一个</button>
        <button class="btn-random" onclick="goRandom()">🎲 随机</button>
        <button onclick="goTo(currentIndex + 1)">下一个 →</button>
        <button class="btn-offline" id="btnOffline" title="下载全部资源到本地，之后无需网络也能使用">📡 离线运行</button>
    </div>
</div>

<script src="animal-data.js"></script>
<script src="image-interaction.js"></script>
<script src="common.js"></script>
<script>
registerSW();
// ============================================================
// 图片和声音文件路径说明：见 animal-data.js
// ============================================================

let currentIndex = 0;

const cardImage = document.getElementById('cardImage');
const zhNameEl = document.getElementById('zhName');
const enNameEl = document.getElementById('enName');
const factEl = document.getElementById('fact');
const currentIdxEl = document.getElementById('currentIdx');
const totalCountEl = document.getElementById('totalCount');
const animalEmojiEl = document.getElementById('animalEmoji');
const loadingOverlay = document.getElementById('loadingOverlay');
const loadingEmoji = document.getElementById('loadingEmoji');

// ========== 展示顺序 ==========
let displayOrder = [];     // 展示顺序（全局索引数组，已随机打乱）
let preloaded = {};        // 已预加载的资源缓存: { url: true }

// 生成随机展示顺序
function buildOrder() {
    const total = animals.length;
    const shuffled = Array.from({length: total}, function(_, i) { return i; });
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = tmp;
    }
    displayOrder = shuffled;
}

// 获取当前展示的动物数据
function currentAnimal() {
    const realIdx = displayOrder[currentIndex];
    return animals[realIdx];
}

// 预加载指定索引的动物图片，返回 Promise
function preloadOne(idx) {
    return new Promise(function(resolve) {
        var a = animals[displayOrder[idx]];
        if (!a.image) { resolve(); return; }
        if (preloaded[a.image]) { resolve(); return; }
        preloaded[a.image] = true;

        var img = new Image();
        var done = false;
        function finish() {
            if (done) return;
            done = true;
            resolve();
        }
        img.onload = finish;
        img.onerror = finish;
        img.src = a.image;
        // 缓存命中时 onload 可能不触发
        if (img.complete) finish();
        // 超时兜底
        setTimeout(finish, 5000);
    });
}

// 后台静默加载音频（不阻塞）
// 用 fetch 触发浏览器/SW 缓存，不再创建 Audio 对象堆积内存
function preloadAudio(idx) {
    var a = animals[displayOrder[idx]];
    var srcs = [];
    if (a.speech_zh) srcs.push(a.speech_zh);
    if (a.speech_en) srcs.push(a.speech_en);
    if (a.speech_fact) srcs.push(a.speech_fact);
    for (var i = 0; i < srcs.length; i++) {
        if (!preloaded[srcs[i]]) {
            preloaded[srcs[i]] = true;
            (function(src) {
                fetch(src).catch(function(){}); // 仅触发缓存，不持有对象
            })(srcs[i]);
        }
    }
}

// 预加载窗口：后方3个（即将看到的）+ 前方1个（回退用的）
var PRELOAD_AHEAD = 3;    // 当前索引之后预加载数
var PRELOAD_BEHIND = 1;   // 当前索引之前预加载数
var preloadingSet = {};   // 正在预加载中的索引

// 获取需要预加载的索引列表（不包含当前）
function getPreloadTargets() {
    var targets = [];
    var total = displayOrder.length;
    // 后方（即将翻到的）
    for (var i = 1; i <= PRELOAD_AHEAD; i++) {
        var idx = currentIndex + i;
        if (idx < total) targets.push(idx);
    }
    // 前方（回退用的）
    for (var i = 1; i <= PRELOAD_BEHIND; i++) {
        var idx = currentIndex - i;
        if (idx >= 0) targets.push(idx);
    }
    return targets;
}

// 并行预加载图片列表，返回 Promise
function preloadBatch(indices) {
    var promises = [];
    for (var i = 0; i < indices.length; i++) {
        (function(idx) {
            if (preloadingSet[idx]) return;
            preloadingSet[idx] = true;
            promises.push(
                preloadOne(idx).then(function() {
                    preloadingSet[idx] = false;
                    preloadAudio(idx);
                })
            );
        })(indices[i]);
    }
    if (promises.length === 0) return Promise.resolve();
    return Promise.all(promises);
}

// 维护预加载窗口（后台静默，带防抖）
var maintainTimer = null;
function maintainPreload() {
    if (maintainTimer) clearTimeout(maintainTimer);
    maintainTimer = setTimeout(function() {
        maintainTimer = null;
        var targets = getPreloadTargets();
        var toLoad = [];
        for (var i = 0; i < targets.length; i++) {
            if (!preloadingSet[targets[i]]) toLoad.push(targets[i]);
        }
        if (toLoad.length > 0) preloadBatch(toLoad);
    }, 200);
}

// 显示加载动画
function showLoading(emoji) {
    loadingEmoji.textContent = emoji || '📷';
    loadingOverlay.classList.remove('hidden', 'fade-out');
}

// 隐藏加载动画（直接隐藏）
function hideLoading() {
    loadingOverlay.classList.add('hidden');
}

// ========== 朗读+复制 ==========
function speakAndCopy(lang) {
    try { speak(lang, currentAnimal()); } catch(e) {}
    try {
        const animal = currentAnimal();
        const text = lang === 'zh' ? animal.zh : animal.en;
        const el = lang === 'zh' ? zhNameEl : enNameEl;

        // clipboard 可能不可用，不影响朗读
        try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).catch(function(){});
            }
        } catch(e) {}

        // 显示复制提示气泡
        let tip = el.querySelector('.copy-tip');
        if (!tip) {
            tip = document.createElement('span');
            tip.className = 'copy-tip';
            tip.textContent = '已复制';
            el.appendChild(tip);
        }
        tip.classList.add('show');
        clearTimeout(el._copyTimer);
        el._copyTimer = setTimeout(function(){ tip.classList.remove('show'); }, 1000);
    } catch(e) {}
}

// ========== 图片渲染（使用 image-interaction.js 模块） ==========
var imageInteractionCleanup = null;

function renderImage() {
    // 清理上一次的交互绑定
    if (imageInteractionCleanup) { imageInteractionCleanup(); imageInteractionCleanup = null; }

    var animal = currentAnimal();
    var hasImage = animal.image && animal.image.length > 0;

    if (!hasImage) {
        cardImage.className = 'card-image no-images';
        cardImage.innerHTML = '<div class="placeholder"><div class="ph-emoji">' + (animal.emoji || '📷') + '</div><div class="ph-text">待添加图片</div></div>';
        return;
    }

    cardImage.className = 'card-image';
    cardImage.style.backgroundColor = '';
    var srcset = '';
    if (animal.image_400 && animal.image_800) {
        srcset = ' srcset="' + animal.image_400 + ' 400w, ' + animal.image_800 + ' 800w, ' + animal.image + ' 1600w" sizes="(max-width: 600px) 100vw, 50vw"';
    }
    cardImage.innerHTML = '<img src="' + animal.image + '"' + srcset + ' alt="' + animal.zh + '" id="cardImg" style="opacity:0"><button class="zoom-toggle" id="zoomToggle" title="放大填充"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><line x1="20" y1="20" x2="16" y2="16"/></svg></button>';

    var cardImgEl = document.getElementById('cardImg');
    var zoomBtn = document.getElementById('zoomToggle');

    // 图片加载完成后淡入
    cardImgEl.onload = function() { cardImgEl.style.opacity = '1'; };
    cardImgEl.onerror = function() {
        // 显示 emoji 占位 + 重试按钮
        cardImage.innerHTML = '<div class="img-fallback"><div class="fallback-emoji">' + (animal.emoji || '📷') + '</div><button class="fallback-retry" id="fallbackRetry">🔄 重新加载</button></div>';
        document.getElementById('fallbackRetry').addEventListener('click', function(e) {
            e.stopPropagation();
            renderImage();
        });
    };
    if (cardImgEl.complete) cardImgEl.style.opacity = '1';

    // 初始化图片交互模块
    imageInteractionCleanup = initImageInteraction({
        container: cardImage,
        img: cardImgEl,
        zoomBtn: zoomBtn
    });
}

// ========== 卡片渲染 ==========
function renderCard() {
    const a = currentAnimal();
    zhNameEl.textContent = a.zh;
    enNameEl.textContent = a.en;
    factEl.textContent = a.fact;
    currentIdxEl.textContent = currentIndex + 1;
    totalCountEl.textContent = displayOrder.length;
    animalEmojiEl.textContent = a.emoji || '';
    renderImage();
}

// ========== 导航 ==========
var navLock = null;  // 导航锁：防止快速翻页时 loading 冲突

function goTo(idx) {
    // 如果正在加载中，取消上一次的等待
    if (navLock) {
        clearTimeout(navLock.timeout);
        navLock = null;
    }

    const total = displayOrder.length;
    if (idx < 0) idx = total - 1;
    if (idx >= total) idx = 0;

    var a = animals[displayOrder[idx]];
    var imgReady = !a.image || preloaded[a.image];

    if (imgReady) {
        // 图片已缓存，直接切换
        currentIndex = idx;
        renderCard();
        setTimeout(function() { speak('zh', currentAnimal()); }, 300);
        maintainPreload();
    } else {
        // 图片未缓存，显示加载动画等待
        showLoading(a.emoji || '📷');
        var lock = { timeout: null };
        navLock = lock;
        lock.timeout = setTimeout(function() {
            if (navLock !== lock) return;
            navLock = null;
            currentIndex = idx;
            renderCard();
            hideLoading();
            maintainPreload();
        }, 5000);
        preloadOne(idx).then(function() {
            if (navLock !== lock) return;
            clearTimeout(lock.timeout);
            navLock = null;
            currentIndex = idx;
            renderCard();
            hideLoading();
            setTimeout(function() { speak('zh', currentAnimal()); }, 300);
            maintainPreload();
        });
    }
}

function goRandom() {
    buildOrder();
    // 不清空 preloaded！已缓存的图片/音频继续有效
    preloadingSet = {};
    goTo(0);
}

// ========== 左右滑动翻页 ==========
// 在整个 .card 容器上监听触摸滑动（含图片区，zoom mode 下自动禁用）
var touchStartX = 0, touchStartY = 0, touchTracking = false;

document.getElementById('card').addEventListener('touchstart', function(e) {
    if (e.touches.length !== 1) return;
    // zoom mode 下不跟踪滑动
    if (cardImage.classList.contains('zoom-mode')) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
    touchTracking = true;
}, { passive: true });

document.getElementById('card').addEventListener('touchend', function(e) {
    if (!touchTracking) return;
    touchTracking = false;
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    // 水平滑动距离 > 50px 且 垂直 < 水平的 50%
    if (Math.abs(dx) > 50 && Math.abs(dy) < Math.abs(dx) * 0.5) {
        if (dx < 0) {
            goTo(currentIndex + 1);  // 左滑 → 下一个
        } else {
            goTo(currentIndex - 1);  // 右滑 → 上一个
        }
    }
}, { passive: true });

// ========== 离线运行按钮（使用 common.js 通用逻辑） ==========
initOfflineButton(document.getElementById('btnOffline'), { defaultText: '📡 离线运行' });

document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
    if (e.key === 'ArrowRight') goTo(currentIndex + 1);
    if (e.key === ' ') { e.preventDefault(); goRandom(); }
});

// ========== 文字点击发音（事件代理） ==========
document.getElementById('card').addEventListener('pointerup', function(e) {
    var target = e.target;
    if (target === zhNameEl) { speakAndCopy('zh'); }
    else if (target === enNameEl) { speakAndCopy('en'); }
    else if (target === factEl) { speak('fact', currentAnimal()); }
    else if (target === animalEmojiEl) { playAnimalSound(currentAnimal()); }
});

// ========== 启动 ==========
buildOrder();

// 首次启动：预加载当前卡片 + 后方3个卡片 = 共4个，完成后再显示
// currentIndex=0，需要预加载索引 0,1,2,3
var initialTargets = getPreloadTargets();  // 返回 1,2,3
initialTargets.unshift(0);                 // 加上当前卡片 → 0,1,2,3

// 显示加载动画
showLoading(animals[displayOrder[0]].emoji || '📷');

// 总超时兜底：6秒后无论如何显示卡片
var bootTimeout = setTimeout(function() {
    if (bootTimeout) {
        bootTimeout = null;
        renderCard();
        hideLoading();
    }
}, 6000);

preloadBatch(initialTargets).then(function() {
    if (!bootTimeout) return; // 已被超时兜底处理
    clearTimeout(bootTimeout);
    bootTimeout = null;
    renderCard();
    hideLoading();
    setTimeout(function() { speak('zh', currentAnimal()); }, 400);
    maintainPreload();
});
</script>
</body>
</html>
