<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>卡片模式 - Animal Flashcards</title>
    <style>
        :root {
            --bg: #f5f0e8;
            --card-bg: #ffffff;
            --primary: #4a7c59;
            --accent: #e8a87c;
            --text: #3c3c3c;
            --radius: 24px;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Segoe UI','PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
            background: var(--bg);
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(74,124,89,0.05) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(232,168,124,0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(74,124,89,0.04) 0%, transparent 50%);
            display: flex; align-items: center; justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .container {
            width: 100%; max-width: 520px;
            height: 100dvh; height: 100svh;
            display: flex; flex-direction: column; align-items: center;
            padding: calc(12px + var(--safe-top)) 16px calc(12px + var(--safe-bottom)) 16px;
        }
        .header { flex-shrink: 0; width: 100%; text-align: center; }
        .header-top {
            display: flex; align-items: center; justify-content: space-between;
            padding: 4px 0; position: relative;
        }
        .header .badge {
            display: inline-block; background: var(--primary); color: #fff;
            font-size: 14px; padding: 8px 18px; border-radius: 20px; letter-spacing: 0.5px;
            flex-shrink: 0; font-weight: 600;
        }
        .header .category-title {
            font-size: clamp(20px, 4.5vw, 26px); font-weight: 700; color: var(--text);
            letter-spacing: 1px; position: absolute; left: 50%; transform: translateX(-50%);
            pointer-events: none;
        }
        .header .btn-select {
            display: inline-block; background: transparent; color: var(--primary);
            font-size: 14px; padding: 8px 18px; border-radius: 20px; letter-spacing: 0.5px;
            border: 2px solid var(--primary); cursor: pointer; text-decoration: none;
            transition: all 0.2s; font-weight: 600; white-space: nowrap;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .header .btn-select:active { background: var(--primary); color: #fff; }
        .header .counter { font-size: 13px; color: #999; font-weight: 500; padding: 4px 0 2px; }

        .card {
            width: 100%; flex: 1 1 auto; min-height: 0;
            background: var(--card-bg); border-radius: var(--radius);
            box-shadow: 0 8px 32px rgba(0,0,0,0.08); overflow: hidden;
            display: flex; flex-direction: column; margin: 10px 0;
        }

        .card-image {
            width: 100%; flex: 1 1 auto; min-height: 0;
            aspect-ratio: 3 / 4; max-height: 100%;
            overflow: hidden; background: #eef2e6; position: relative;
            touch-action: none;
        }
        .card-image.zoom-mode { cursor: grab; }
        .card-image.zoom-mode.dragging { cursor: grabbing; }
        .card-image img {
            position: absolute; display: block;
            width: 100%; height: 100%;
            object-fit: contain;
            transition: opacity 0.35s ease, transform 0.3s ease;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }
        .card-image.zoom-mode img {
            object-fit: unset;
        }
        .card-image img.switching { opacity: 0; }

        /* 缩放切换按钮 */
        .zoom-toggle {
            position: absolute; bottom: 12px; right: 12px; z-index: 10;
            width: 36px; height: 36px; border-radius: 50%;
            background: rgba(0,0,0,0.45); border: none;
            color: #fff; font-size: 18px; line-height: 36px; text-align: center;
            cursor: pointer; backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: all 0.25s; display: flex;
            align-items: center; justify-content: center;
            padding: 0;
        }
        .zoom-toggle:active { transform: scale(0.9); background: rgba(0,0,0,0.65); }
        .zoom-toggle svg { width: 16px; height: 16px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; }
        .zoom-toggle.hidden { display: none; }

        .card-image.no-images {
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .card-image.no-images .placeholder { text-align: center; }
        .card-image.no-images .placeholder .ph-emoji {
            font-size: clamp(80px, 18vw, 140px); display: block; line-height: 1;
        }
        .card-image.no-images .placeholder .ph-text {
            font-size: 11px; letter-spacing: 1px; color: #c0c0c0; margin-top: 4px;
        }

        .card-body {
            flex-shrink: 0; padding: 14px 24px 16px;
            text-align: left; min-height: 120px;
            display: flex; flex-direction: column; justify-content: center;
            position: relative;
        }
        .card-body .animal-emoji {
            position: absolute; top: 14px; right: 24px;
            font-size: clamp(36px, 7vw, 48px); line-height: 1;
            opacity: 0.85; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .card-body .animal-emoji:active { transform: scale(1.2); }
        .card-body .zh-name {
            font-size: clamp(28px, 5vw, 36px); font-weight: 700; color: var(--text);
            cursor: pointer; line-height: 1.3; min-height: 1.3em; padding-right: 60px;
            position: relative;
        }
        .card-body .zh-name:active { color: var(--primary); }
        .copy-tip {
            position: absolute; top: -28px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: #fff; font-size: 12px;
            padding: 3px 10px; border-radius: 10px; white-space: nowrap;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
        }
        .copy-tip.show { opacity: 1; }
        .copy-tip.show { opacity: 1; }
        .card-body .en-name {
            font-size: clamp(17px, 3.5vw, 20px); font-weight: 400; color: #888;
            cursor: pointer; margin-top: 8px; line-height: 1.4; min-height: 1.4em;
            padding-right: 60px; position: relative;
        }
        .card-body .en-name:active { color: var(--accent); }
        .card-body .fact {
            font-size: clamp(12px, 2.2vw, 14px); color: #888; margin-top: 12px;
            line-height: 1.65; cursor: pointer;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
            overflow: hidden; padding-right: 4px;
        }
        .card-body .fact:active { color: var(--primary); }

        .nav {
            flex-shrink: 0; display: flex; gap: 10px; align-items: center;
            width: 100%; justify-content: center; padding: 4px 0;
        }
        .nav button {
            background: var(--card-bg); border: 2px solid #e0dcd4;
            color: var(--text); font-size: 15px; padding: 11px 22px;
            border-radius: 50px; cursor: pointer; transition: all 0.2s;
            font-weight: 600; letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            white-space: nowrap; -webkit-tap-highlight-color: transparent;
        }
        .nav button:active { border-color: var(--primary); color: var(--primary); transform: scale(0.95); }
        .nav .btn-random { border-color: var(--accent); color: var(--accent); }
        .nav .btn-random:active { background: var(--accent); color: #fff; }

        @media (min-width: 640px) {
            .container { max-width: 480px; padding: 24px 16px; }
            .card { max-height: 700px; }
            .card-image { aspect-ratio: auto; max-height: 420px; }
            .card-body { min-height: 130px; }
        }
        @media (min-height: 850px) and (min-width: 400px) {
            .card-body { padding: 18px 28px 20px; min-height: 130px; }
            .nav button { padding: 13px 26px; font-size: 16px; }
        }
        @media (max-height: 700px) {
            .header-top { padding: 1px 0; }
            .header .badge { font-size: 12px; padding: 6px 14px; }
            .header .category-title { font-size: 18px; }
            .header .btn-select { font-size: 12px; padding: 6px 14px; }
            .header .counter { font-size: 11px; }
            .card { margin: 6px 0; }
            .card-body { padding: 10px 16px 12px; min-height: 100px; }
            .card-body .fact { -webkit-line-clamp: 2; }
            .nav button { padding: 9px 16px; font-size: 13px; }
            .nav { gap: 8px; }
        }

        /* ========== 加载动画遮罩 ========== */
        .loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loading-overlay.fade-out { opacity: 0; pointer-events: none; }
        .loading-overlay.hidden { display: none; }
        .loading-emoji {
            font-size: 80px;
            animation: breathe 1.2s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.3); opacity: 1; }
        }
    </style>
</head>
<body>

<!-- 加载动画遮罩 -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-emoji" id="loadingEmoji">🦁</div>
</div>

<div class="container">
    <div class="header">
        <div class="header-top">
            <div class="badge">卡片模式</div>
            <div class="category-title">动物</div>
            <a class="btn-select" href="animal-select.html">浏览模式</a>
        </div>
        <div class="counter"><span id="currentIdx">1</span> / <span id="totalCount">20</span></div>
    </div>
    <div class="card" id="card">
        <div class="card-image" id="cardImage"></div>
        <div class="card-body">
            <div class="animal-emoji" id="animalEmoji"></div>
            <div class="zh-name" id="zhName"></div>
            <div class="en-name" id="enName"></div>
            <div class="fact" id="fact"></div>
        </div>
    </div>
    <div class="nav">
        <button onclick="goTo(currentIndex - 1)">← 上一个</button>
        <button class="btn-random" onclick="goRandom()">🎲 随机</button>
        <button onclick="goTo(currentIndex + 1)">下一个 →</button>
    </div>
</div>

<script>

const animals = [
    { zh:'狮子', en:'Lion', emoji:'🦁', sound:'', speech_zh:'animal/speech_zh/lion.mp3', speech_en:'animal/speech_en/lion.mp3', speech_fact:'animal/speech_fact/lion.mp3', image:'animal/images/lion.jpg',

    { zh:'老虎', en:'Tiger', emoji:'🐯', sound:'', speech_zh:'animal/speech_zh/tiger.mp3', speech_en:'animal/speech_en/tiger.mp3', speech_fact:'animal/speech_fact/tiger.mp3', image:'animal/images/tiger.jpg',
      fact:'老虎是世界上最大的猫科动物，每只老虎身上的条纹都是独一无二的，就像人类的指纹一样。' },

      fact:'长颈鹿是地球上最高的陆地动物，脖子虽然很长，但颈椎骨数量和人类一样都是7块。' },

    { zh:'企鹅', en:'Penguin', emoji:'🐧', sound:'', speech_zh:'animal/speech_zh/penguin.mp3', speech_en:'animal/speech_en/penguin.mp3', speech_fact:'animal/speech_fact/penguin.mp3', image:'animal/images/penguin.jpg',
      fact:'企鹅是鸟类中的游泳高手，帝企鹅可以潜入500米深的海水中，憋气超过20分钟。' },
    { zh:'海豚', en:'Dolphin', emoji:'🐬', sound:'', speech_zh:'animal/speech_zh/dolphin.mp3', speech_en:'animal/speech_en/dolphin.mp3', speech_fact:'animal/speech_fact/dolphin.mp3', image:'animal/images/dolphin.jpg',
      fact:'海豚是非常聪明的海洋哺乳动物，它们用超声波定位和交流，睡觉时大脑一半休息一半保持清醒。' },
    { zh:'猴子', en:'Monkey', emoji:'🐵', sound:'', speech_zh:'animal/speech_zh/monkey.mp3', speech_en:'animal/speech_en/monkey.mp3', speech_fact:'animal/speech_fact/monkey.mp3', image:'animal/images/monkey.jpg',
      fact:'猴子是灵长类动物中种类最丰富的一类，它们有复杂的社会结构，会使用工具和互相梳理毛发。' },

      fact:'兔子的耳朵可以转动270度，帮助它们听到远处的危险。它们高兴时会跳起来在空中转身，这叫binky。' },

      fact:'猫是世界上最受欢迎的宠物之一。它们呼噜呼噜的声音不仅能表示开心，还能帮助骨骼愈合。' },
    { zh:'狗', en:'Dog', emoji:'🐶', sound:'', speech_zh:'animal/speech_zh/dog.mp3', speech_en:'animal/speech_en/dog.mp3', speech_fact:'animal/speech_fact/dog.mp3', image:'animal/images/dog.jpg',

    { zh:'马', en:'Horse', emoji:'🐴', sound:'', speech_zh:'animal/speech_zh/horse.mp3', speech_en:'animal/speech_en/horse.mp3', speech_fact:'animal/speech_fact/horse.mp3', image:'animal/images/horse.jpg',

      fact:'牛有四个胃室来消化草料，它们能看到颜色，而且对红色其实并不敏感。' },
    { zh:'羊', en:'Sheep', emoji:'🐑', sound:'', speech_zh:'animal/speech_zh/sheep.mp3', speech_en:'animal/speech_en/sheep.mp3', speech_fact:'animal/speech_fact/sheep.mp3', image:'animal/images/sheep.jpg',
      fact:'绵羊有极好的记忆力，能记住50多张面孔长达两年。它们还能通过面部表情识别同伴的情绪。' },

    { zh:'蝴蝶', en:'Butterfly', emoji:'🦋', sound:'', speech_zh:'animal/speech_zh/butterfly.mp3', speech_en:'animal/speech_en/butterfly.mp3', speech_fact:'animal/speech_fact/butterfly.mp3', image:'animal/images/butterfly.jpg',
      fact:'蝴蝶用脚来尝味道！它们的翅膀上覆盖着细小的鳞片，这些鳞片能反射光线产生绚丽的色彩。' },
    { zh:'青蛙', en:'Frog', emoji:'🐸', sound:'', speech_zh:'animal/speech_zh/frog.mp3', speech_en:'animal/speech_en/frog.mp3', speech_fact:'animal/speech_fact/frog.mp3', image:'animal/images/frog.jpg',
      fact:'青蛙的皮肤可以吸收水分和氧气，所以它们对环境污染特别敏感。它们是环境健康的"指示物种"。' },
    { zh:'鲨鱼', en:'Shark', emoji:'🦈', sound:'', speech_zh:'animal/speech_zh/shark.mp3', speech_en:'animal/speech_en/shark.mp3', speech_fact:'animal/speech_fact/shark.mp3', image:'animal/images/shark.jpg',
      fact:'鲨鱼比恐龙出现的时间还早，已经在地球上生存超过4亿年。它们一生会换掉超过3万颗牙齿。' }

let currentIndex = 0;

const cardImage = document.getElementById('cardImage');
const zhNameEl = document.getElementById('zhName');
const enNameEl = document.getElementById('enName');
const factEl = document.getElementById('fact');
const currentIdxEl = document.getElementById('currentIdx');
const totalCountEl = document.getElementById('totalCount');
const animalEmojiEl = document.getElementById('animalEmoji');
const loadingOverlay = document.getElementById('loadingOverlay');
const loadingEmoji = document.getElementById('loadingEmoji');

// ========== 分组预加载 ==========
const GROUP_SIZE = 6;
let displayOrder = [];     // 展示顺序（全局索引数组，已随机打乱）
let groups = [];           // 分组后的索引数组: [[5,2,...], [3,8,...], ...]
let groupIndex = -1;       // 当前所在组
let loadedAssets = {};     // 已预加载的资源缓存: { url: true }
let preloadQueue = [];     // 待预加载的组（避免重复加载）

// 生成分组：随机打乱所有动物 → 按6个一组切 → 最后一组可能不足6个
function buildGroups() {
    const total = animals.length;
    // Fisher-Yates 洗牌
    const shuffled = Array.from({length: total}, function(_, i) { return i; });
    for (let i = shuffled.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        const tmp = shuffled[i]; shuffled[i] = shuffled[j]; shuffled[j] = tmp;
    }

    // 按 GROUP_SIZE 分组，不补足
    groups = [];
    for (let i = 0; i < shuffled.length; i += GROUP_SIZE) {
        groups.push(shuffled.slice(i, i + GROUP_SIZE));
    }

    // 展平为展示顺序
    displayOrder = [];
    for (let g = 0; g < groups.length; g++) {
        for (let i = 0; i < groups[g].length; i++) {
            displayOrder.push(groups[g][i]);
        }
    }

    // 重置预加载队列
    preloadQueue = [];
}

// 判断当前索引是否需要切换到新组
function getGroupForIndex(idx) {
    for (let g = 0; g < groups.length; g++) {
        const start = g * GROUP_SIZE;
        const end = start + groups[g].length;
        if (idx >= start && idx < end) return g;
    }
    return groups.length - 1;
}

// 获取当前展示的动物数据
function currentAnimal() {
    const realIdx = displayOrder[currentIndex];
    return animals[realIdx];
}

// 获取当前组需要预加载的所有资源 URL
function getGroupAssetUrls(groupIdx) {
    const urls = [];
    const group = groups[groupIdx];
    if (!group) return urls;
    for (let i = 0; i < group.length; i++) {
        const a = animals[group[i]];
        if (a.image) urls.push(a.image);
        if (a.speech_zh) urls.push(a.speech_zh);
        if (a.speech_en) urls.push(a.speech_en);
        if (a.speech_fact) urls.push(a.speech_fact);
        if (a.sound) urls.push(a.sound);
    }
    return urls;
}

// 预加载一组资源
function preloadGroup(groupIdx) {
    return new Promise(function(resolve) {
        const urls = getGroupAssetUrls(groupIdx);
        const toLoad = [];
        for (let i = 0; i < urls.length; i++) {
            const url = urls[i];
            if (!loadedAssets[url]) {
                toLoad.push(url);
                loadedAssets[url] = true;
            }
        }
        if (toLoad.length === 0) { resolve(); return; }

        let pending = toLoad.length;
        function oneDone() {
            pending--;
            if (pending <= 0) resolve();
        }
        for (let i = 0; i < toLoad.length; i++) {
            const url = toLoad[i];
            const isAudio = /\.(mp3|wav|ogg|m4a)(\?|$)/i.test(url);
            if (isAudio) {
                const audio = new Audio();
                audio.preload = 'auto';
                audio.src = url;
                audio.onloadeddata = oneDone;
                audio.onerror = oneDone;
                // 超时兜底
                setTimeout(function() { if (audio.readyState < 2) oneDone(); }, 3000);
            } else {
                const img = new Image();
                img.src = url;
                img.onload = oneDone;
                img.onerror = oneDone;
                setTimeout(function() { if (!img.complete) oneDone(); }, 3000);
            }
        }
    });
}

// 显示加载动画
function showLoading(emoji) {
    loadingEmoji.textContent = emoji || '📷';
    loadingOverlay.classList.remove('hidden', 'fade-out');
}

// 隐藏加载动画
function hideLoading() {
    loadingOverlay.classList.add('fade-out');
    setTimeout(function() {
        loadingOverlay.classList.add('hidden');
    }, 500);
}

// 后台静默预加载指定组（如果还没加载过）
function preloadGroupSilent(groupIdx) {
    if (groupIdx < 0 || groupIdx >= groups.length) return;
    if (preloadQueue.indexOf(groupIdx) >= 0) return; // 已经在队列中
    preloadQueue.push(groupIdx);
    preloadGroup(groupIdx).then(function() {
        var pos = preloadQueue.indexOf(groupIdx);
        if (pos >= 0) preloadQueue.splice(pos, 1);
    });
}

// ========== 音效 ==========
function playAnimalSound() {
    const animal = currentAnimal();
    if (!animal.sound) return;
    const audio = new Audio(animal.sound);
    audio.volume = 0.8;
    audio.play().catch(function() {});
}

// ========== 语音朗读（预录制 MP3，全平台兼容） ==========
var speechAudio = null;

function speak(lang) {
    try {
        var animal = currentAnimal();
        var src;
        if (lang === 'zh') src = animal.speech_zh;
        else if (lang === 'en') src = animal.speech_en;
        else if (lang === 'fact') src = animal.speech_fact;
        if (!src) return;
        if (speechAudio) { speechAudio.pause(); speechAudio = null; }
        speechAudio = new Audio(src);
        speechAudio.volume = 1;
        speechAudio.play().catch(function(){});
    } catch(e) {}
}

// ========== 朗读+复制 ==========
function speakAndCopy(lang) {
    try { speak(lang); } catch(e) {}
    try {
        const animal = currentAnimal();
        const text = lang === 'zh' ? animal.zh : animal.en;
        const el = lang === 'zh' ? zhNameEl : enNameEl;

        // clipboard 可能不可用，不影响朗读
        try {
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).catch(function(){});
            }
        } catch(e) {}

        // 显示复制提示气泡
        let tip = el.querySelector('.copy-tip');
        if (!tip) {
            tip = document.createElement('span');
            tip.className = 'copy-tip';
            tip.textContent = '已复制';
            el.appendChild(tip);
        }
        tip.classList.add('show');
        clearTimeout(el._copyTimer);
        el._copyTimer = setTimeout(function(){ tip.classList.remove('show'); }, 1000);
    } catch(e) {}
}

// ========== 图片渲染 + 拖拽 + 双指缩放 + 缩放切换 ==========
let zoomEnabled = false;
let offsetX = 0, offsetY = 0;
let zoomScale = 1;      // 当前缩放倍率（相对于 cover 状态的基准）
let baseScale = 1;      // cover 状态下的基准缩放比例
let cardImg = null;

function getImgBaseSize() {
    if (!cardImg || !cardImg.naturalWidth) return { w: 0, h: 0 };
    const cw = cardImage.clientWidth;
    const ch = cardImage.clientHeight;
    const iw = cardImg.naturalWidth;
    const ih = cardImg.naturalHeight;
    baseScale = Math.max(cw / iw, ch / ih);
    return { w: iw * baseScale, h: ih * baseScale };
}

function applyImgSize() {
    if (!cardImg) return;
    const { w, h } = getImgBaseSize();
    const sw = w * zoomScale;
    const sh = h * zoomScale;
    const cw = cardImage.clientWidth;
    const ch = cardImage.clientHeight;
    cardImg.style.width = sw + 'px';
    cardImg.style.height = sh + 'px';
    cardImg.style.left = ((cw - sw) / 2) + 'px';
    cardImg.style.top = ((ch - sh) / 2) + 'px';
}

function clampAllOffsets() {
    if (!cardImg) return;
    const cw = cardImage.clientWidth;
    const ch = cardImage.clientHeight;
    const imgW = parseFloat(cardImg.style.width) || cw;
    const imgH = parseFloat(cardImg.style.height) || ch;
    const maxDX = Math.max(0, (imgW - cw) / 2);
    const maxDY = Math.max(0, (imgH - ch) / 2);
    offsetX = Math.max(-maxDX, Math.min(maxDX, offsetX));
    offsetY = Math.max(-maxDY, Math.min(maxDY, offsetY));
    applyOffset();
}

function setZoomMode(on) {
    zoomEnabled = on;
    if (on) {
        cardImage.classList.add('zoom-mode');
        zoomScale = 1;
        offsetX = 0; offsetY = 0;
        applyImgSize();
        if (cardImg) { cardImg.style.transition = 'transform 0.3s ease'; cardImg.style.transform = ''; }
        updateZoomIcon();
    } else {
        cardImage.classList.remove('zoom-mode', 'dragging');
        zoomScale = 1;
        offsetX = 0; offsetY = 0;
        if (cardImg) {
            cardImg.style.transition = 'transform 0.3s ease';
            cardImg.style.transform = '';
            cardImg.style.width = '100%';
            cardImg.style.height = '100%';
            cardImg.style.left = '0';
            cardImg.style.top = '0';
        }
        updateZoomIcon();
    }
}

function updateZoomIcon() {
    const btn = cardImage.querySelector('.zoom-toggle');
    if (!btn) return;
    if (zoomEnabled) {
        btn.innerHTML = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/></svg>`;
        btn.title = '缩小查看完整图片';
    } else {
        btn.innerHTML = `<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><line x1="20" y1="20" x2="16" y2="16"/></svg>`;
        btn.title = '放大填充';
    }
}

function applyOffset() {
    if (!cardImg) return;
    cardImg.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
}

function onDragStart() {
    if (!zoomEnabled) return;
    if (cardImg) cardImg.style.transition = 'none';
}

function onDragMove(ex, ey, prevX, prevY) {
    if (!zoomEnabled) return;
    const dx = ex - prevX;
    const dy = ey - prevY;

    offsetX += dx;
    offsetY += dy;

    clampAllOffsets();
    return { x: ex, y: ey };
}

function onDragEnd() {
    if (!zoomEnabled) return;
    if (cardImg) cardImg.style.transition = 'transform 0.15s ease';
}

// ========== 双指缩放 ==========
let pinchStartDist = 0;
let pinchStartScale = 1;
let pinchCenterX = 0, pinchCenterY = 0;
let pinchStartOffsetX = 0, pinchStartOffsetY = 0;

function getTouchDist(t1, t2) {
    return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
}

function getTouchCenter(t1, t2) {
    return {
        x: (t1.clientX + t2.clientX) / 2,
        y: (t1.clientY + t2.clientY) / 2
    };
}

function onPinchStart(t1, t2) {
    // 非zoom模式下双指缩放，自动进入zoom模式
    if (!zoomEnabled) {
        setZoomMode(true);
        // setZoomMode 会重置 zoomScale，需要重新获取
    }
    pinchStartDist = getTouchDist(t1, t2);
    pinchStartScale = zoomScale;
    pinchStartOffsetX = offsetX;
    pinchStartOffsetY = offsetY;
    const c = getTouchCenter(t1, t2);
    pinchCenterX = c.x; pinchCenterY = c.y;
    if (cardImg) cardImg.style.transition = 'none';
}

function onPinchMove(t1, t2) {
    if (pinchStartDist === 0) return;
    const newDist = getTouchDist(t1, t2);
    const ratio = newDist / pinchStartDist;
    const newScale = Math.max(0.5, Math.min(4, pinchStartScale * ratio));

    // 以双指中心为锚点缩放
    const c = getTouchCenter(t1, t2);
    const rect = cardImage.getBoundingClientRect();
    const anchorX = c.x - rect.left;
    const anchorY = c.y - rect.top;
    const imgRect = cardImg.getBoundingClientRect();
    const imgCX = imgRect.left + imgRect.width / 2;
    const imgCY = imgRect.top + imgRect.height / 2;
    const relX = anchorX - imgCX;
    const relY = anchorY - imgCY;

    const scaleChange = newScale / zoomScale;
    zoomScale = newScale;
    applyImgSize();

    offsetX = pinchStartOffsetX - relX * (scaleChange - 1);
    offsetY = pinchStartOffsetY - relY * (scaleChange - 1);
    clampAllOffsets();
}

function onPinchEnd() {
    pinchStartDist = 0;
    if (cardImg) cardImg.style.transition = 'transform 0.15s ease';
}

function renderImage() {
    // 清理上一次渲染的全局事件监听
    if (cardImage._cleanup) { cardImage._cleanup(); cardImage._cleanup = null; }

    const animal = currentAnimal();
    const hasImage = animal.image && animal.image.length > 0;
    zoomEnabled = false;
    zoomScale = 1;
    offsetX = 0; offsetY = 0;

    if (!hasImage) {
        cardImage.className = 'card-image no-images';
        cardImage.innerHTML = `
            <div class="placeholder">
                <div class="ph-emoji">${animal.emoji || '📷'}</div>
                <div class="ph-text">待添加图片</div>
            </div>`;
        cardImage.ontouchstart = null;
        cardImage.ontouchmove = null;
        cardImage.ontouchend = null;
        cardImage.onmousedown = null;
        cardImg = null;
        return;
    }

    cardImage.className = 'card-image';
    cardImage.style.backgroundColor = '';
    cardImage.innerHTML = `
        <img src="${animal.image}" alt="${animal.zh}" id="cardImg">
        <button class="zoom-toggle" id="zoomToggle" title="放大填充">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="6"/><line x1="20" y1="20" x2="16" y2="16"/></svg>
        </button>`;

    cardImg = document.getElementById('cardImg');
    const zoomBtn = document.getElementById('zoomToggle');

    // 图片加载后提取边缘平均色设为容器背景
    cardImg.addEventListener('load', function() {
        if (!cardImg.naturalWidth) return;
        try {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            const iw = cardImg.naturalWidth, ih = cardImg.naturalHeight;
            canvas.width = iw; canvas.height = ih;
            ctx.drawImage(cardImg, 0, 0, iw, ih);

            // 取最外围一圈像素
            const top = ctx.getImageData(0, 0, iw, 1).data;
            const bottom = ctx.getImageData(0, ih-1, iw, 1).data;
            const left = ctx.getImageData(0, 0, 1, ih).data;
            const right = ctx.getImageData(iw-1, 0, 1, ih).data;

            let r = 0, g = 0, b = 0, count = 0;
            const add = (data) => {
                for (let i = 0; i < data.length; i += 4) {
                    r += data[i]; g += data[i+1]; b += data[i+2]; count++;
                }
            };
            add(top); add(bottom); add(left); add(right);
            r = Math.round(r / count);
            g = Math.round(g / count);
            b = Math.round(b / count);

            cardImage.style.backgroundColor = `rgb(${r},${g},${b})`;
        } catch(e) {}
    });

    zoomBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        setZoomMode(!zoomEnabled);
    });

    zoomBtn.addEventListener('pointerdown', function(e) {
        e.stopPropagation();
    });

    // === 鼠标滚轮缩放（模拟双指缩放） ===
    cardImage.addEventListener('wheel', function(e) {
        if (!cardImg) return;
        e.preventDefault();

        // 非zoom模式下滚轮缩放，自动进入zoom模式
        if (!zoomEnabled) {
            setZoomMode(true);
        }

        const rect = cardImage.getBoundingClientRect();
        const anchorX = e.clientX - rect.left;
        const anchorY = e.clientY - rect.top;

        // 保存缩放前的状态
        const prevScale = zoomScale;
        const imgRect = cardImg.getBoundingClientRect();
        const imgCX = imgRect.left + imgRect.width / 2;
        const imgCY = imgRect.top + imgRect.height / 2;
        const relX = anchorX - imgCX;
        const relY = anchorY - imgCY;

        // 根据滚轮方向调整缩放
        const delta = e.deltaY > 0 ? -0.1 : 0.1;
        const newScale = Math.max(0.5, Math.min(4, zoomScale + delta));

        if (newScale === zoomScale) return;

        const scaleChange = newScale / zoomScale;
        zoomScale = newScale;
        applyImgSize();

        // 以鼠标位置为锚点调整偏移
        offsetX = offsetX - relX * (scaleChange - 1);
        offsetY = offsetY - relY * (scaleChange - 1);
        clampAllOffsets();

        if (cardImg) cardImg.style.transition = 'none';
        clearTimeout(cardImage._wheelTimer);
        cardImage._wheelTimer = setTimeout(function() {
            if (cardImg) cardImg.style.transition = 'transform 0.15s ease';
        }, 150);
    }, { passive: false });

    // === 统一拖拽（Pointer Events + setPointerCapture） ===
    let pointerDown = false, lastPX = 0, lastPY = 0;
    let pointerId = null;

    function onPointerDown(e) {
        if (e.target === zoomBtn) return;
        pointerDown = true;
        pointerId = e.pointerId;
        lastPX = e.clientX; lastPY = e.clientY;
        cardImage.setPointerCapture(e.pointerId);
        onDragStart();
        if (zoomEnabled) { cardImage.classList.add('dragging'); }
    }

    function onPointerMove(e) {
        if (!pointerDown || e.pointerId !== pointerId) return;
        const result = onDragMove(e.clientX, e.clientY, lastPX, lastPY);
        if (result) { lastPX = result.x; lastPY = result.y; }
    }

    function onPointerUp(e) {
        if (!pointerDown || e.pointerId !== pointerId) return;
        pointerDown = false;
        pointerId = null;
        onDragEnd();
        cardImage.classList.remove('dragging');
        try { cardImage.releasePointerCapture(e.pointerId); } catch(ex) {}
    }

    cardImage.addEventListener('pointerdown', onPointerDown);
    cardImage.addEventListener('pointermove', onPointerMove);
    cardImage.addEventListener('pointerup', onPointerUp);
    cardImage.addEventListener('pointercancel', onPointerUp);

    // === 触摸双指缩放 ===
    let pinchActive = false;

    function onTouchStart(e) {
        if (e.target === zoomBtn) return;
        if (e.touches.length === 2) {
            pinchActive = true;
            onPinchStart(e.touches[0], e.touches[1]);
            return;
        }
        pinchActive = false;
        pinchStartDist = 0;
    }

    function onTouchMove(e) {
        if (e.touches.length === 2 && pinchActive) {
            onPinchMove(e.touches[0], e.touches[1]);
            e.preventDefault();
        }
    }

    function onTouchEnd(e) {
        if (pinchActive && e.touches.length < 2) {
            pinchActive = false;
            onPinchEnd();
        }
    }

    cardImage.addEventListener('touchstart', onTouchStart, { passive: false });
    cardImage.addEventListener('touchmove', onTouchMove, { passive: false });
    cardImage.addEventListener('touchend', onTouchEnd);

    // 清理函数
    cardImage._cleanup = function() {
        cardImage.removeEventListener('pointerdown', onPointerDown);
        cardImage.removeEventListener('pointermove', onPointerMove);
        cardImage.removeEventListener('pointerup', onPointerUp);
        cardImage.removeEventListener('pointercancel', onPointerUp);
        cardImage.removeEventListener('touchstart', onTouchStart);
        cardImage.removeEventListener('touchmove', onTouchMove);
        cardImage.removeEventListener('touchend', onTouchEnd);
    };
}

// ========== 卡片渲染 ==========
function renderCard() {
    const a = currentAnimal();
    zhNameEl.textContent = a.zh;
    enNameEl.textContent = a.en;
    factEl.textContent = a.fact;
    currentIdxEl.textContent = currentIndex + 1;
    totalCountEl.textContent = displayOrder.length;
    animalEmojiEl.textContent = a.emoji || '';
    renderImage();
}

// ========== 导航 ==========
function goTo(idx) {
    const total = displayOrder.length;
    if (idx < 0) idx = total - 1;
    if (idx >= total) idx = 0;

    var newGroup = getGroupForIndex(idx);

    // 如果跨组，且新组还没加载完 → 显示加载动画等待
    if (newGroup !== groupIndex) {
        groupIndex = newGroup;

        // 检查新组是否已预加载（资源已在缓存中）
        var urls = getGroupAssetUrls(newGroup);
        var allCached = true;
        for (var i = 0; i < urls.length; i++) {
            if (!loadedAssets[urls[i]]) { allCached = false; break; }
        }

        if (allCached) {
            // 已预加载好，直接切换
            currentIndex = idx;
            renderCard();
            setTimeout(function() { speak('zh'); }, 300);
            // 后台预加载后续两组
            preloadGroupSilent(newGroup + 1);
            preloadGroupSilent(newGroup + 2);
        } else {
            // 还没加载好，显示动画等待
            var group = groups[newGroup];
            var firstAnimal = animals[group[0]];
            showLoading(firstAnimal.emoji || '📷');
            preloadGroup(newGroup).then(function() {
                currentIndex = idx;
                renderCard();
                hideLoading();
                setTimeout(function() { speak('zh'); }, 400);
                // 后台预加载后续两组
                preloadGroupSilent(newGroup + 1);
                preloadGroupSilent(newGroup + 2);
            });
        }
    } else {
        // 同组内切换，直接渲染
        currentIndex = idx;
        renderCard();
        setTimeout(function() { speak('zh'); }, 300);
    }
}

function goRandom() {
    let ni;
    const total = displayOrder.length;
    do { ni = Math.floor(Math.random() * total); }
    while (ni === currentIndex && total > 1);
    goTo(ni);
}

document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
    if (e.key === 'ArrowRight') goTo(currentIndex + 1);
    if (e.key === ' ') { e.preventDefault(); goRandom(); }
});

// ========== 文字点击发音（事件代理） ==========
document.getElementById('card').addEventListener('pointerup', function(e) {
    var target = e.target;
    if (target === zhNameEl) { speakAndCopy('zh'); }
    else if (target === enNameEl) { speakAndCopy('en'); }
    else if (target === factEl) { speak('fact'); }
    else if (target === animalEmojiEl) { playAnimalSound(); }
});

// ========== 启动 ==========
buildGroups();
groupIndex = 0;
var firstGroup = groups[0];
showLoading(animals[firstGroup[0]].emoji || '📷');

// 首屏：预加载组0（等待）+ 组1组2（后台），防止快速翻页卡顿
var promises = [preloadGroup(0)];
if (groups.length > 1) {
    preloadGroupSilent(1);
    if (groups.length > 2) {
        preloadGroupSilent(2);
    }
}

// 第0组加载完就显示（不等待第1组）
promises[0].then(function() {
    renderCard();
    hideLoading();
    setTimeout(function() { speak('zh'); }, 400);
});
</script>
